      }

      }

      }

      .filter-section
      {

      }

      {
        from

          transform: translateY(10px);
        }

          transform: translateY(0);
        }

        <div class="grid grid-cols-2 gap-3 mb-3"><button id="clear-all-btn" class="h-12 bg-gray-100 border-2 border-gray-200 rounded-xl text-dark text-sm font-semibold hover:bg-gray-200 transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-xmark"></i><span>Vymazat
              vše</span></button><button id="apply-filters-btn" class="h-12 bg-gradient-to-r from-primary to-primaryDark text-white text-sm font-bold rounded-xl hover:shadow-xl transition-all flex items-center justify-center gap-2"><i class="fa-solid fa-check"></i><span>Použít filtry</span></button>
        </div>
        <div class="flex items-center justify-center gap-2 text-xs text-gray-500">
          <i class="fa-solid fa-circle-info"></i><span>Zobrazeno <span class="font-bold text-primary">24 akcí</span> podle filtrů</span>
        </div>
      </div>
    </div>
    <script>
      window.addEventListener('load', function()
      {
        const checkboxes = document.querySelectorAll('.filter-checkbox');
        const participantsRange = document.getElementById(
          'participants-range');
        const participantsValue = document.getElementById(
          'participants-value');
        const applyFiltersBtn = document.getElementById(
        'apply-filters-btn');
        const clearAllBtn = document.getElementById('clear-all-btn');
        const backBtn = document.getElementById('back-btn');
        const resetAllBtn = document.getElementById('reset-all-btn');

        checkboxes.forEach(checkbox =>
        {
          checkbox.addEventListener('change', function()
          {
            const label = this.nextElementSibling;
            const checkIcon = label.querySelector('.fa-check');
            const radioCircle = label.querySelector('.w-2\\.5');

            if (this.checked)
            {
              label.classList.add('border-primary',
                'bg-gradient-to-r', 'from-primary', 'to-accent');
              label.classList.remove('border-gray-200');
              if (checkIcon)
              {
                checkIcon.classList.remove('hidden');
              }
              if (radioCircle)
              {
                radioCircle.classList.remove('hidden');
              }
            }
            else
            {
              label.classList.remove('border-primary',
                'bg-gradient-to-r', 'from-primary', 'to-accent');
              label.classList.add('border-gray-200');
              if (checkIcon)
              {
                checkIcon.classList.add('hidden');
              }
              if (radioCircle)
              {
                radioCircle.classList.add('hidden');
              }
            }
          });
        });

        if (participantsRange && participantsValue)
        {
          participantsRange.addEventListener('input', function()
          {
            participantsValue.textContent = this.value + '+';
          });
        }

        if (applyFiltersBtn)
        {
          applyFiltersBtn.addEventListener('click', function()
          {
            console.log(
              'Filters applied, navigating back to Events List');
            window.history.back();
          });
        }

        if (clearAllBtn)
        {
          clearAllBtn.addEventListener('click', function()
          {
            checkboxes.forEach(checkbox =>
            {
              checkbox.checked = false;
              const label = checkbox.nextElementSibling;
              label.classList.remove('border-primary',
                'bg-gradient-to-r', 'from-primary', 'to-accent');
              label.classList.add('border-gray-200');
              const checkIcon = label.querySelector('.fa-check');
              const radioCircle = label.querySelector('.w-2\\.5');
              if (checkIcon) checkIcon.classList.add('hidden');
              if (radioCircle) radioCircle.classList.add('hidden');
            });

            document.querySelectorAll(
              'input[type="text"], input[type="date"], input[type="time"], input[type="number"]'
              ).forEach(input =>
            {
              input.value = '';
            });

            if (participantsRange) participantsRange.value = 50;
            if (participantsValue) participantsValue.textContent =
            '50+';
          });
        }

        if (backBtn)
        {
          backBtn.addEventListener('click', function()
          {
            window.history.back();
          });
        }

        if (resetAllBtn)
        {
          resetAllBtn.addEventListener('click', function()
          {
            clearAllBtn.click();
          });
        }

        document.querySelectorAll('[id$="-clear-btn"]').forEach(btn =>
        {
          btn.addEventListener('click', function()
          {
            const sectionId = this.id.replace('clear-', '').replace(
              '-btn', '');
            const section = document.getElementById(sectionId +
              '-section');
            if (section)
            {
              section.querySelectorAll('.filter-checkbox').forEach(
                checkbox =>
                {
                  checkbox.checked = false;
                  const label = checkbox.nextElementSibling;
                  label.classList.remove('border-primary',
                    'bg-gradient-to-r', 'from-primary',
                    'to-accent');
                  label.classList.add('border-gray-200');
                  const checkIcon = label.querySelector(
                    '.fa-check');
                  const radioCircle = label.querySelector(
                    '.w-2\\.5');
                  if (checkIcon) checkIcon.classList.add(
                  'hidden');
                  if (radioCircle) radioCircle.classList.add(
                    'hidden');
                });
              section.querySelectorAll(
                'input[type="text"], input[type="date"], input[type="time"], input[type="number"]'
                ).forEach(input =>
              {
                input.value = '';
              });
            }
          });
        });

        document.getElementById('salsa').checked = true;
        document.getElementById('salsa').dispatchEvent(new Event('change'));
        document.getElementById('prague').checked = true;
        document.getElementById('prague').dispatchEvent(new Event(
        'change'));
        document.getElementById('sort-nearest').checked = true;
        document.getElementById('sort-nearest').dispatchEvent(new Event(
          'change'));
      });
    </script>
  

</body></html>
