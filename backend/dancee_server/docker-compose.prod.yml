version: '3.8'

services:
  dancee-server-prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: dancee-server-prod
    ports:
      - "3001:3001"
    volumes:
      # Mount secrets folder for Firebase credentials
      - ./secrets:/app/secrets
    env_file:
      - .env
    restart: always
    networks:
      - dancee-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  dancee-network:
    driver: bridge
