version: '3.8'

services:
  dancee-server-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dancee-server-dev
    ports:
      - "3001:3001"
      - "9229:9229"  # Debug port
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src
      - ./test:/app/test
      - ./nest-cli.json:/app/nest-cli.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      # Mount secrets folder for Firebase credentials
      - ./secrets:/app/secrets
      # Mount .env file for environment variables
      - ./.env:/app/.env
      # Prevent overwriting node_modules
      - /app/node_modules
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - dancee-network

networks:
  dancee-network:
    driver: bridge
