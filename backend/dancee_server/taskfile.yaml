version: '3'

tasks:
  install:
    desc: Install dependencies
    cmds:
      - npm install

  dev:
    desc: Start development server with hot reload
    cmds:
      - npm run start:dev

  start:
    desc: Start production server
    cmds:
      - npm run start:prod

  build:
    desc: Build the application
    cmds:
      - npm run build

  lint:
    desc: Run linter
    cmds:
      - npm run lint

  format:
    desc: Format code with prettier
    cmds:
      - npm run format

  test:
    desc: Run tests
    cmds:
      - npm run test

  test-watch:
    desc: Run tests in watch mode
    cmds:
      - npm run test:watch

  test-e2e:
    desc: Run end-to-end tests
    cmds:
      - npm run test:e2e

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist
      - rm -rf node_modules

  # Docker tasks
  docker-dev:
    desc: Start development server in Docker with hot reload
    cmds:
      - docker-compose -f docker-compose.dev.yml up --build

  docker-dev-down:
    desc: Stop development Docker container
    cmds:
      - docker-compose -f docker-compose.dev.yml down

  docker-prod:
    desc: Build and start production Docker container
    cmds:
      - docker-compose -f docker-compose.prod.yml up --build -d

  docker-prod-down:
    desc: Stop production Docker container
    cmds:
      - docker-compose -f docker-compose.prod.yml down

  docker-prod-logs:
    desc: View production Docker container logs
    cmds:
      - docker-compose -f docker-compose.prod.yml logs -f

  docker-clean:
    desc: Remove all Docker containers, images, and volumes
    cmds:
      - docker-compose -f docker-compose.dev.yml down -v --rmi all
      - docker-compose -f docker-compose.prod.yml down -v --rmi all

  # Fly.io deployment tasks
  deploy:
    desc: Deploy to Fly.io (interactive setup)
    cmds:
      - chmod +x deploy.sh
      - ./deploy.sh

  deploy-quick:
    desc: Quick deploy to Fly.io (no prompts)
    cmds:
      - chmod +x deploy-quick.sh
      - ./deploy-quick.sh

  deploy-logs:
    desc: View Fly.io deployment logs
    cmds:
      - fly logs --app dancee-server

  deploy-status:
    desc: Check Fly.io deployment status
    cmds:
      - fly status --app dancee-server

  deploy-open:
    desc: Open deployed app in browser
    cmds:
      - fly open --app dancee-server

  deploy-ssh:
    desc: SSH into Fly.io instance
    cmds:
      - fly ssh console --app dancee-server

  deploy-restart:
    desc: Restart Fly.io app
    cmds:
      - fly apps restart dancee-server

  deploy-secrets:
    desc: List Fly.io secrets
    cmds:
      - fly secrets list --app dancee-server
