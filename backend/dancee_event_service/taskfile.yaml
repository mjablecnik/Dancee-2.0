version: '3'

tasks:
  run:
    desc: Run the server in development mode
    cmds:
      - dart run bin/server.dart

  run-watch:
    desc: Run the server with hot reload (using dart watch)
    cmds:
      - dart run --enable-vm-service bin/server.dart

  get-deps:
    desc: Install dependencies
    cmds:
      - dart pub get

  test:
    desc: Run tests
    cmds:
      - dart test

  clean:
    desc: Clean the project
    cmds:
      - dart clean

  build:
    desc: Compile the server to native executable
    cmds:
      - dart compile exe bin/server.dart -o build/dancee_event_service

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -t dancee_event_service .

  docker-run:
    desc: Run Docker container
    cmds:
      - docker run -p 8080:8080 dancee_event_service
