app = 'dancee-cms'
primary_region = 'fra'

[build]
  image = 'directus/directus:latest'

[http_service]
  internal_port = 8055
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  max_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    type = 'http'
    port = 8055
    path = '/server/health'
    interval = '30s'
    timeout = '5s'
    grace_period = "10s"
