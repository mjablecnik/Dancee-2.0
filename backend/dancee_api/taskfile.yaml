version: '3'

tasks:
  install:
    desc: Install dependencies
    cmds:
      - npm install

  dev:
    desc: Start development server with hot reload
    cmds:
      - npm run dev

  build:
    desc: Build TypeScript to JavaScript
    cmds:
      - npm run build

  start:
    desc: Start production server
    cmds:
      - npm start

  test:
    desc: Run all tests
    cmds:
      - npm test

  test-watch:
    desc: Run tests in watch mode
    cmds:
      - npm run test:watch

  test-coverage:
    desc: Run tests with coverage report
    cmds:
      - npm run test:coverage

  lint:
    desc: Run ESLint
    cmds:
      - npm run lint

  lint-fix:
    desc: Run ESLint and fix issues
    cmds:
      - npm run lint:fix

  format:
    desc: Format code with Prettier
    cmds:
      - npm run format

  format-check:
    desc: Check code formatting
    cmds:
      - npm run format:check

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf dist/
      - rm -rf coverage/
      - rm -rf node_modules/

  clean-build:
    desc: Clean and rebuild
    cmds:
      - task: clean
      - task: install
      - task: build
