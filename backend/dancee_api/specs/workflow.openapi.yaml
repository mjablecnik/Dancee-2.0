openapi: 3.0.0
info:
  title: Dancee Workflow API
  version: 1.0.0
  description: |
    REST API for the dancee_workflow service.

    Processes Facebook dance events through an AI-powered pipeline:
    scraping, event classification, LLM-based parts/info extraction,
    venue geocoding via Nominatim, multilingual translation (CS, EN, ES),
    and storage in Directus CMS.

    All endpoints use the `/api` prefix. The HTTP server internally rewrites
    `/api/*` paths to Restate service handlers before forwarding.

servers:
  - url: https://dancee-workflow.fly.dev
    description: Production (Restate ingress)
  - url: http://localhost:8080
    description: Development (Restate ingress)

tags:
  - name: Events
    description: Single-event and batch event processing
  - name: Listing
    description: Querying stored events and courses
  - name: Favorites
    description: User favorites management

paths:
  /api/event:
    post:
      tags:
        - Events
      summary: Process a single Facebook event
      description: |
        Submits a Facebook event URL for AI-powered processing.

        The workflow:
        1. Scrapes the event
        2. Checks for duplicates
        3. Classifies event type:
           - party, workshop, festival, holiday → stored in the events collection
           - course, lesson → extracted with the course extraction prompt and stored in the courses collection
           - other → skipped and recorded in skipped_events
        4. For events: extracts structured parts and info (including dresscode) via LLM
        5. Resolves venue via Nominatim geocoding
        6. Translates content to CS, EN, ES
        7. Validates dance style codes against the dance_styles collection
        8. Processes cover image (download from Facebook → reuse expired AI image → generate via AI)
        9. Stores in Directus CMS with image, image_source, and event_type fields

        The workflow key is deterministic (derived from the normalised URL), so
        repeated calls with the same URL return the existing result.
      operationId: processEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessEventRequest'
            example:
              url: "https://www.facebook.com/events/1234567890"
      responses:
        '200':
          description: Event processed (or skipped if unsupported type / duplicate)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/DirectusEvent'
                  - $ref: '#/components/schemas/AlreadyProcessingResponse'
                  - type: 'null'
        '400':
          description: Missing or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/event/reprocess:
    post:
      tags:
        - Events
      summary: Reprocess parts of an existing event
      description: |
        Re-runs selected processing steps on an existing event in Directus.

        Available steps:
        - `parts` — re-extract event parts and title via LLM
        - `info` — re-extract event info (prices, URLs) via LLM
        - `translations` — re-translate to CS, EN, ES (or a single language via `lang`)
        - `dances` — recompute dances array from current parts

        Note: `parts` automatically triggers `dances` recomputation.
        Either `id` or `translationId` must be provided.
      operationId: reprocessEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReprocessEventRequest'
            examples:
              allSteps:
                summary: Reprocess everything
                value:
                  id: 42
              translationsOnly:
                summary: Only redo translations
                value:
                  id: 42
                  steps: ["translations"]
              singleLanguage:
                summary: Retranslate to English only
                value:
                  id: 42
                  steps: ["translations"]
                  lang: "en"
              fromTranslation:
                summary: Reprocess via translation record ID
                value:
                  translationId: 15
                  steps: ["translations"]
              partsAndDances:
                summary: Re-extract parts and recompute dances
                value:
                  id: 42
                  steps: ["parts", "dances"]
      responses:
        '200':
          description: Event reprocessed and updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectusEvent'
        '400':
          description: Missing ID or invalid steps
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/events/process:
    get:
      tags:
        - Events
      summary: Trigger batch processing of all groups
      description: |
        Kicks off batch processing for all groups stored in Directus (ordered by `updated_at`).
        Returns immediately with an acknowledgement; processing continues asynchronously via Restate.
      operationId: processBatch
      responses:
        '200':
          description: Batch processing acknowledged and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchAcknowledgement'
              example:
                acknowledged: true
                message: "Batch processing started"

  /api/events/group:
    post:
      tags:
        - Events
      summary: Trigger processing of a single Facebook group
      description: |
        Kicks off asynchronous processing for a single Facebook group URL.
        Returns immediately with an acknowledgement.
      operationId: processGroup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessGroupRequest'
            example:
              url: "https://www.facebook.com/PragueSalsaClub/events"
      responses:
        '200':
          description: Group processing acknowledged and started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchAcknowledgement'
        '400':
          description: Missing or invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/events/list:
    get:
      tags:
        - Listing
      summary: List published events
      description: |
        Returns all published events from Directus with expanded translations and venue.

        Use request headers to control the response:
        - `x-dancee-filter`: JSON-encoded Directus filter (allowed fields: dances, start_time, end_time, venue, organizer, translation_status)
        - `x-dancee-lang`: Language code (cs, en, es) — flattens the matching translation onto each event
        - `x-dancee-include: original_description` — includes the original Facebook description
      operationId: listEvents
      parameters:
        - name: x-dancee-filter
          in: header
          required: false
          description: |
            JSON-encoded Directus filter. Allowed fields: dances, start_time, end_time, venue, organizer, translation_status.
          schema:
            type: string
          example: '{"dances":{"_contains":"Salsa"}}'
        - name: x-dancee-lang
          in: header
          required: false
          description: Language code. Flattens matching translation onto each event and removes the translations array.
          schema:
            type: string
            enum: [cs, en, es]
          example: cs
        - name: x-dancee-include
          in: header
          required: false
          description: Set to `original_description` to include the original Facebook description.
          schema:
            type: string
            enum: [original_description]
      responses:
        '200':
          description: List of published events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DirectusEvent'

  /api/courses/list:
    post:
      tags:
        - Listing
      summary: List published courses
      description: |
        Returns published courses from Directus with expanded translations and venue.

        Use request headers to control the response:
        - `x-dancee-filter`: JSON-encoded Directus filter (allowed fields: dances, start_date, end_date, venue, level, translation_status)
        - `x-dancee-lang`: Language code (cs, en, es) — flattens the matching translation onto each course
      operationId: listCourses
      parameters:
        - name: x-dancee-filter
          in: header
          required: false
          description: JSON-encoded Directus filter. Allowed fields: dances, start_date, end_date, venue, level, translation_status.
          schema:
            type: string
          example: '{"dances":{"_contains":"salsa"}}'
        - name: x-dancee-lang
          in: header
          required: false
          description: Language code. Flattens matching translation onto each course and removes the translations array.
          schema:
            type: string
            enum: [cs, en, es]
          example: cs
      responses:
        '200':
          description: List of published courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DirectusCourse'

  /api/favorites:
    post:
      tags:
        - Favorites
      summary: Create a favorite
      description: |
        Saves an event or course as a favorite for a user.
        Validates that the referenced event or course exists before creating the favorite.
        The combination of (user_id, item_type, item_id) must be unique.
      operationId: createFavorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DirectusFavorite'
            example:
              user_id: "user-123"
              item_type: "event"
              item_id: 42
      responses:
        '200':
          description: Created favorite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectusFavorite'
        '400':
          description: Duplicate favorite, missing fields, or invalid item reference
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/favorites/delete:
    post:
      tags:
        - Favorites
      summary: Delete a favorite
      description: Removes a saved favorite by user_id, item_type, and item_id.
      operationId: deleteFavorite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - item_type
                - item_id
              properties:
                user_id:
                  type: string
                  example: "user-123"
                item_type:
                  type: string
                  enum: [event, course]
                  example: "event"
                item_id:
                  type: integer
                  example: 42
      responses:
        '200':
          description: Favorite deleted successfully
        '404':
          description: Favorite not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/favorites/list:
    post:
      tags:
        - Favorites
      summary: List favorites for a user
      description: Returns all saved items (events and courses) for the specified user.
      operationId: listFavorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
              properties:
                user_id:
                  type: string
                  example: "user-123"
      responses:
        '200':
          description: List of favorites for the user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DirectusFavorite'
        '400':
          description: Missing user_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ProcessEventRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: Facebook event URL to process
          example: "https://www.facebook.com/events/1234567890"

    ProcessGroupRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          description: Facebook page or group URL to scrape events from
          example: "https://www.facebook.com/PragueSalsaClub/events"

    ReprocessEventRequest:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
          description: Directus event ID. Either `id` or `translationId` is required.
          example: 42
        translationId:
          oneOf:
            - type: integer
            - type: string
          description: Directus translation record ID. Alternative to `id` — parent event and language are resolved automatically.
          example: 15
        steps:
          type: array
          description: Steps to re-run. If omitted, all steps are executed.
          items:
            type: string
            enum: [parts, info, translations, dances]
          example: ["translations"]
        lang:
          type: string
          description: Language code — when provided, only that language is (re-)translated.
          enum: [cs, en, es]
          example: "en"

    BatchAcknowledgement:
      type: object
      required:
        - acknowledged
        - message
      properties:
        acknowledged:
          type: boolean
          example: true
        message:
          type: string
          example: "Batch processing started"

    AlreadyProcessingResponse:
      type: object
      description: Returned when a workflow was already invoked for this URL but the event is not yet in Directus
      required:
        - status
        - url
      properties:
        status:
          type: string
          enum: [already_processing]
          example: "already_processing"
        url:
          type: string
          example: "https://www.facebook.com/events/1234567890"

    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "Missing required field: 'url'"
        code:
          type: integer
          example: 400

    DirectusEvent:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
          example: 42
        title:
          type: string
          example: "Pražská Salsa Noc"
        original_description:
          type: string
          description: Original Facebook event description (omitted by default)
        organizer:
          type: string
          example: "Prague Salsa Club"
        venue:
          oneOf:
            - type: integer
            - type: string
            - $ref: '#/components/schemas/DirectusVenue'
            - type: 'null'
        start_time:
          type: string
          format: date-time
          nullable: true
          example: "2024-02-15T20:00:00.000Z"
        end_time:
          type: string
          format: date-time
          nullable: true
          example: "2024-02-16T02:00:00.000Z"
        timezone:
          type: string
          example: "Europe/Prague"
        original_url:
          type: string
          example: "https://www.facebook.com/events/1234567890"
        parts:
          type: array
          items:
            $ref: '#/components/schemas/EventPart'
        info:
          type: array
          items:
            $ref: '#/components/schemas/EventInfo'
        dances:
          type: array
          items:
            type: string
          example: ["Salsa", "Bachata"]
        status:
          type: string
          enum: [published, draft, archived]
          example: "published"
        image:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
          description: Directus file ID of the event cover image (stored in Directus Files / S3)
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        image_source:
          type: string
          enum: [facebook, ai_generated]
          nullable: true
          description: Origin of the cover image — "facebook" (downloaded from Facebook) or "ai_generated"
          example: "facebook"
        event_type:
          type: string
          enum: [party, workshop, festival, holiday, other]
          nullable: true
          description: Classified event type
          example: "party"
        translation_status:
          type: string
          enum: [complete, partial, missing]
          example: "complete"
        translations:
          type: array
          items:
            $ref: '#/components/schemas/DirectusEventTranslation'

    EventPart:
      type: object
      required: [name, description, type, dances, date_time_range, lectors, djs]
      properties:
        name:
          type: string
          example: "Social Dancing"
        description:
          type: string
        type:
          type: string
          enum: [party, workshop, openLesson]
          example: "party"
        dances:
          type: array
          items:
            type: string
          example: ["Salsa"]
        date_time_range:
          type: object
          required: [start, end]
          properties:
            start:
              type: string
              format: date-time
            end:
              type: string
              format: date-time
        lectors:
          type: array
          items:
            type: string
        djs:
          type: array
          items:
            type: string
          example: ["DJ Carlos"]

    EventInfo:
      type: object
      required: [type, key, value]
      properties:
        type:
          type: string
          enum: [url, price, dresscode]
          example: "price"
        key:
          type: string
          example: "Entry Fee"
        value:
          type: string
          example: "200 Kč"

    DirectusEventTranslation:
      type: object
      required: [languages_code, title, description, parts_translations, info_translations]
      properties:
        id:
          type: integer
        events_id:
          oneOf:
            - type: integer
            - type: string
        languages_code:
          type: string
          example: "cs"
        title:
          type: string
          example: "Pražská Salsa Noc"
        description:
          type: string
        parts_translations:
          type: array
          items:
            type: object
            required: [name, description]
            properties:
              name:
                type: string
              description:
                type: string
        info_translations:
          type: array
          items:
            type: object
            required: [key]
            properties:
              key:
                type: string

    DirectusVenue:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        name:
          type: string
          example: "Lucerna Music Bar"
        street:
          type: string
          example: "Vodičkova"
        number:
          type: string
          example: "36"
        town:
          type: string
          example: "Prague"
        country:
          type: string
          example: "CZ"
        postal_code:
          type: string
          example: "110 00"
        region:
          type: string
          example: "Hlavní město Praha"
        latitude:
          type: number
          nullable: true
          example: 50.0813
        longitude:
          type: number
          nullable: true
          example: 14.4258

    DirectusCourse:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
          example: 1
        title:
          type: string
          example: "Salsa On1 — Beginner Course"
        description:
          type: string
        instructor_name:
          type: string
          nullable: true
          example: "Maria García"
        instructor_bio:
          type: string
          nullable: true
        instructor_avatar_url:
          type: string
          nullable: true
        venue:
          oneOf:
            - type: integer
            - type: string
            - $ref: '#/components/schemas/DirectusVenue'
            - type: 'null'
          description: Venue ID or expanded venue object
        start_date:
          type: string
          format: date
          nullable: true
          example: "2024-03-05"
        end_date:
          type: string
          format: date
          nullable: true
          example: "2024-05-28"
        schedule_day:
          type: string
          nullable: true
          example: "Tuesday"
        schedule_time:
          type: string
          nullable: true
          example: "19:00 - 20:30"
        lesson_count:
          type: integer
          nullable: true
          example: 12
        lesson_duration_minutes:
          type: integer
          nullable: true
          example: 90
        max_participants:
          type: integer
          nullable: true
          example: 20
        current_participants:
          type: integer
          default: 0
          example: 8
        price:
          type: string
          nullable: true
          example: "3 600 Kč"
        price_note:
          type: string
          nullable: true
          example: "Includes all 12 lessons"
        level:
          type: string
          enum: [beginner, intermediate, advanced, all_levels]
          nullable: true
          example: "beginner"
        dances:
          type: array
          items:
            type: string
          example: ["salsa-on1", "salsa"]
        image:
          oneOf:
            - type: integer
            - type: string
            - type: 'null'
          description: Directus file ID of the course cover image
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        image_source:
          type: string
          enum: [facebook, ai_generated]
          nullable: true
          description: Origin of the cover image
          example: "facebook"
        original_url:
          type: string
          nullable: true
          example: "https://www.facebook.com/events/1234567890"
        original_description:
          type: string
          nullable: true
        status:
          type: string
          enum: [published, draft, archived]
          example: "published"
        translation_status:
          type: string
          enum: [complete, partial, missing]
          nullable: true
          example: "complete"
        translations:
          type: array
          items:
            $ref: '#/components/schemas/DirectusCourseTranslation'

    DirectusCourseTranslation:
      type: object
      properties:
        id:
          type: integer
        courses_id:
          oneOf:
            - type: integer
            - type: string
        languages_code:
          type: string
          example: "en"
        title:
          type: string
          example: "Salsa On1 — Beginner Course"
        description:
          type: string
        learning_items:
          type: array
          items:
            type: string
          example: ["Basic salsa footwork", "Partner leading and following", "Turns and spins"]

    DirectusDanceStyle:
      type: object
      properties:
        code:
          type: string
          description: Unique identifier and primary key (e.g. "salsa", "bachata-sensual")
          example: "salsa"
        name:
          type: string
          description: English display name
          example: "Salsa"
        parent_code:
          type: string
          nullable: true
          description: Code of the parent dance style (null for top-level styles)
          example: null
        sort_order:
          type: integer
          description: Display ordering
          example: 1

    DirectusFavorite:
      type: object
      required:
        - user_id
        - item_type
        - item_id
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
          example: 1
        user_id:
          type: string
          description: User identifier (indexed)
          example: "user-123"
        item_type:
          type: string
          enum: [event, course]
          description: Type of the saved item
          example: "event"
        item_id:
          type: integer
          description: ID of the saved event or course
          example: 42
        created_at:
          type: string
          format: date-time
          description: Timestamp when the favorite was created (auto-set)
          example: "2024-02-15T20:00:00.000Z"
