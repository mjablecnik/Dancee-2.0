openapi: 3.0.0
info:
  title: Dancee API - Complete Documentation
  version: 1.0.0
  description: |
    Complete API documentation for all Dancee backend services.
    
    This unified documentation includes:
    - **Events API**: Event management and user favorites
    
    Facebook event scraping is handled internally by the dancee_workflow service
    and is not exposed as a public API.
  contact:
    name: Dancee API Support
    email: support@dancee.app

servers:
  - url: https://dancee-events.fly.dev
    description: Events API - Production
  - url: http://localhost:8080
    description: Events API - Development

tags:
  - name: Events - Health
    description: Events service health check
  - name: Events - Event Management
    description: Event listing and retrieval
  - name: Events - Favorites
    description: User favorite event management

paths:
  /health:
    get:
      tags:
        - Events - Health
      summary: Health check (Events API)
      description: Check if the Events API server is running and healthy
      operationId: eventsHealthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/events/list:
    get:
      tags:
        - Events - Event Management
      summary: List all events
      description: |
        Retrieve all dance events. Optionally mark favorite events for a specific user.
      operationId: listEvents
      parameters:
        - name: userId
          in: query
          description: User identifier to mark favorite events
          required: false
          schema:
            type: string
          example: user123
      responses:
        '200':
          description: List of events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

  /api/events/favorites:
    get:
      tags:
        - Events - Favorites
      summary: List favorite events
      description: Retrieve all favorite events for a specific user
      operationId: listFavorites
      parameters:
        - name: userId
          in: query
          description: User identifier
          required: true
          schema:
            type: string
          example: user123
      responses:
        '200':
          description: List of favorite events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: Missing required userId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Events - Favorites
      summary: Add favorite event
      description: Add an event to a user's favorites
      operationId: addFavorite
      requestBody:
        description: User and event identifiers
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFavoriteRequest'
            example:
              userId: user123
              eventId: event-001
      responses:
        '201':
          description: Favorite added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddFavoriteResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/events/favorites/{eventId}:
    delete:
      tags:
        - Events - Favorites
      summary: Remove favorite event
      description: Remove an event from a user's favorites
      operationId: removeFavorite
      parameters:
        - name: eventId
          in: path
          description: Event identifier to remove
          required: true
          schema:
            type: string
          example: event-001
        - name: userId
          in: query
          description: User identifier
          required: true
          schema:
            type: string
          example: user123
      responses:
        '204':
          description: Favorite removed successfully
        '400':
          description: Missing required userId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Event:
      type: object
      required:
        - id
        - title
        - organizer
        - venue
        - startTime
        - dances
      properties:
        id:
          type: string
          description: Unique event identifier
          example: event-001
        title:
          type: string
          description: Event title
          example: Prague Salsa Night
        description:
          type: string
          description: Event description
          example: Join us for an amazing night of Salsa dancing!
        organizer:
          type: string
          description: Event organizer name
          example: Prague Salsa Club
        venue:
          $ref: '#/components/schemas/Venue'
        startTime:
          type: string
          format: date-time
          description: Event start time in ISO 8601 format
          example: "2024-02-15T20:00:00Z"
        endTime:
          type: string
          format: date-time
          description: Event end time in ISO 8601 format
          example: "2024-02-16T02:00:00Z"
        dances:
          type: array
          description: List of dance styles
          items:
            type: string
          example:
            - Salsa
            - Bachata
        isFavorite:
          type: boolean
          description: Whether the event is marked as favorite
          example: false

    Venue:
      type: object
      required:
        - name
        - address
      properties:
        name:
          type: string
          description: Venue name
          example: Lucerna Music Bar
        address:
          $ref: '#/components/schemas/Address'
        latitude:
          type: number
          format: double
          description: Venue latitude coordinate
          example: 50.0813
        longitude:
          type: number
          format: double
          description: Venue longitude coordinate
          example: 14.4258

    Address:
      type: object
      required:
        - street
        - city
        - postalCode
        - country
      properties:
        street:
          type: string
          example: Vodičkova 36
        city:
          type: string
          example: Prague
        postalCode:
          type: string
          example: "110 00"
        country:
          type: string
          example: Czech Republic

    AddFavoriteRequest:
      type: object
      required:
        - userId
        - eventId
      properties:
        userId:
          type: string
          example: user123
        eventId:
          type: string
          example: event-001

    AddFavoriteResponse:
      type: object
      required:
        - message
        - userId
        - eventId
      properties:
        message:
          type: string
          example: Favorite added successfully
        userId:
          type: string
          example: user123
        eventId:
          type: string
          example: event-001

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: userId query parameter is required
