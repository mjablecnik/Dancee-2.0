openapi: 3.0.0
info:
  title: Dancee Events API
  version: 1.0.0
  description: |
    REST API for managing dance events and user favorites.
    
    The Dancee Events API provides endpoints to list dance events, manage user favorites,
    and retrieve event details. Events include information about venues, schedules, dance styles,
    and event parts (workshops, parties, courses).
  contact:
    name: Dancee API Support
    email: support@dancee.app

servers:
  - url: https://dancee-events.fly.dev
    description: Production server
  - url: http://localhost:8080
    description: Development server

tags:
  - name: Health
    description: Health check endpoints
  - name: Events
    description: Event listing and retrieval
  - name: Favorites
    description: User favorite event management

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the server is running and healthy
      operationId: healthCheck
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok

  /api/events/list:
    get:
      tags:
        - Events
      summary: List all events
      description: |
        Retrieve all dance events. Optionally mark favorite events for a specific user.
        
        This endpoint supports both `/api/events/list` (recommended) and `/events/list` (legacy) formats.
      operationId: listEvents
      parameters:
        - name: userId
          in: query
          description: User identifier to mark favorite events
          required: false
          schema:
            type: string
          example: user123
      responses:
        '200':
          description: List of events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: event-001
                  title: Prague Salsa Night
                  description: Join us for an amazing night of Salsa dancing!
                  organizer: Prague Salsa Club
                  venue:
                    name: Lucerna Music Bar
                    address:
                      street: Vodičkova 36
                      city: Prague
                      postalCode: "110 00"
                      country: Czech Republic
                    latitude: 50.0813
                    longitude: 14.4258
                  startTime: "2024-02-15T20:00:00Z"
                  endTime: "2024-02-16T02:00:00Z"
                  duration: 21600000
                  dances:
                    - Salsa
                    - Bachata
                  info:
                    - type: price
                      key: Entry Fee
                      value: 200 Kč
                  parts:
                    - name: Social Dancing
                      type: party
                      startTime: "2024-02-15T20:00:00Z"
                      endTime: "2024-02-16T02:00:00Z"
                      djs:
                        - DJ Carlos
                        - DJ Maria
                  isFavorite: false
                  isPast: false

  /events/list:
    get:
      tags:
        - Events
      summary: List all events (legacy)
      description: |
        Legacy endpoint for backward compatibility. Use `/api/events/list` instead.
        
        Retrieve all dance events. Optionally mark favorite events for a specific user.
      operationId: listEventsLegacy
      deprecated: true
      parameters:
        - name: userId
          in: query
          description: User identifier to mark favorite events
          required: false
          schema:
            type: string
          example: user123
      responses:
        '200':
          description: List of events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

  /api/events:
    post:
      tags:
        - Events
      summary: Create a new event
      description: |
        Create a new dance event with the provided details.
        
        Required fields: title, organizer, venue, startTime, dances.
        Optional fields: description, endTime, duration, info, parts.
      operationId: createEvent
      requestBody:
        description: Event data to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
            example:
              title: Prague Salsa Night
              description: Join us for an amazing night of Salsa dancing!
              organizer: Prague Salsa Club
              venue:
                name: Lucerna Music Bar
                address:
                  street: Vodičkova 36
                  city: Prague
                  postalCode: "110 00"
                  country: Czech Republic
                latitude: 50.0813
                longitude: 14.4258
              startTime: "2024-02-15T20:00:00Z"
              endTime: "2024-02-16T02:00:00Z"
              duration: 21600000
              dances:
                - Salsa
                - Bachata
              info:
                - type: price
                  key: Entry Fee
                  value: 200 Kč
              parts:
                - name: Social Dancing
                  type: party
                  startTime: "2024-02-15T20:00:00Z"
                  endTime: "2024-02-16T02:00:00Z"
                  djs:
                    - DJ Carlos
                    - DJ Maria
      responses:
        '201':
          description: Event created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: event-001
                title: Prague Salsa Night
                description: Join us for an amazing night of Salsa dancing!
                organizer: Prague Salsa Club
                venue:
                  name: Lucerna Music Bar
                  address:
                    street: Vodičkova 36
                    city: Prague
                    postalCode: "110 00"
                    country: Czech Republic
                  latitude: 50.0813
                  longitude: 14.4258
                startTime: "2024-02-15T20:00:00Z"
                endTime: "2024-02-16T02:00:00Z"
                duration: 21600000
                dances:
                  - Salsa
                  - Bachata
                isFavorite: false
                isPast: false
        '400':
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Key: 'CreateEventRequest.Title' Error:Field validation for 'Title' failed on the 'required' tag"

  /api/events/{id}:
    get:
      tags:
        - Events
      summary: Get event by ID
      description: |
        Retrieve a single dance event by its unique identifier.
        
        Optionally provide a userId query parameter to include the isFavorite field
        indicating whether the event is in the user's favorites.
      operationId: getEventById
      parameters:
        - name: id
          in: path
          description: Unique event identifier
          required: true
          schema:
            type: string
          example: event-001
        - name: userId
          in: query
          description: User identifier to check favorite status
          required: false
          schema:
            type: string
          example: user123
      responses:
        '200':
          description: Event retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: event-001
                title: Prague Salsa Night
                description: Join us for an amazing night of Salsa dancing!
                organizer: Prague Salsa Club
                venue:
                  name: Lucerna Music Bar
                  address:
                    street: Vodičkova 36
                    city: Prague
                    postalCode: "110 00"
                    country: Czech Republic
                  latitude: 50.0813
                  longitude: 14.4258
                startTime: "2024-02-15T20:00:00Z"
                endTime: "2024-02-16T02:00:00Z"
                duration: 21600000
                dances:
                  - Salsa
                  - Bachata
                info:
                  - type: price
                    key: Entry Fee
                    value: 200 Kč
                parts:
                  - name: Social Dancing
                    type: party
                    startTime: "2024-02-15T20:00:00Z"
                    endTime: "2024-02-16T02:00:00Z"
                    djs:
                      - DJ Carlos
                      - DJ Maria
                isFavorite: false
                isPast: false
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Event not found

    put:
      tags:
        - Events
      summary: Update an existing event
      description: |
        Update an existing dance event with the provided details.
        
        Required fields: title, organizer, venue, startTime, dances.
        Optional fields: description, endTime, duration, info, parts.
      operationId: updateEvent
      parameters:
        - name: id
          in: path
          description: Unique event identifier
          required: true
          schema:
            type: string
          example: event-001
      requestBody:
        description: Updated event data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
            example:
              title: Prague Salsa Night - Updated
              description: Join us for an amazing night of Salsa dancing!
              organizer: Prague Salsa Club
              venue:
                name: Lucerna Music Bar
                address:
                  street: Vodičkova 36
                  city: Prague
                  postalCode: "110 00"
                  country: Czech Republic
                latitude: 50.0813
                longitude: 14.4258
              startTime: "2024-02-15T20:00:00Z"
              endTime: "2024-02-16T02:00:00Z"
              duration: 21600000
              dances:
                - Salsa
                - Bachata
                - Kizomba
      responses:
        '200':
          description: Event updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
              example:
                id: event-001
                title: Prague Salsa Night - Updated
                description: Join us for an amazing night of Salsa dancing!
                organizer: Prague Salsa Club
                venue:
                  name: Lucerna Music Bar
                  address:
                    street: Vodičkova 36
                    city: Prague
                    postalCode: "110 00"
                    country: Czech Republic
                  latitude: 50.0813
                  longitude: 14.4258
                startTime: "2024-02-15T20:00:00Z"
                endTime: "2024-02-16T02:00:00Z"
                duration: 21600000
                dances:
                  - Salsa
                  - Bachata
                  - Kizomba
                isFavorite: false
                isPast: false
        '400':
          description: Invalid request body or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "Key: 'CreateEventRequest.Title' Error:Field validation for 'Title' failed on the 'required' tag"
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Event not found

    delete:
      tags:
        - Events
      summary: Delete an event
      description: |
        Delete a dance event by its unique identifier.
        
        This operation also removes the event from all users' favorites.
      operationId: deleteEvent
      parameters:
        - name: id
          in: path
          description: Unique event identifier
          required: true
          schema:
            type: string
          example: event-001
      responses:
        '204':
          description: Event deleted successfully
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Event not found

  /api/events/favorites:
    get:
      tags:
        - Favorites
      summary: List favorite events
      description: |
        Retrieve all favorite events for a specific user.
        
        This endpoint supports both `/api/events/favorites` (recommended) and `/events/favorites` (legacy) formats.
      operationId: listFavorites
      parameters:
        - name: userId
          in: query
          description: User identifier
          required: true
          schema:
            type: string
          example: user123
      responses:
        '200':
          description: List of favorite events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
              example:
                - id: event-001
                  title: Prague Salsa Night
                  organizer: Prague Salsa Club
                  isFavorite: true
        '400':
          description: Missing required userId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: userId query parameter is required

    post:
      tags:
        - Favorites
      summary: Add favorite event
      description: |
        Add an event to a user's favorites.
        
        This endpoint supports both `/api/events/favorites` (recommended) and `/events/favorites` (legacy) formats.
      operationId: addFavorite
      requestBody:
        description: User and event identifiers
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFavoriteRequest'
            example:
              userId: user123
              eventId: event-001
      responses:
        '201':
          description: Favorite added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddFavoriteResponse'
              example:
                message: Favorite added successfully
                userId: user123
                eventId: event-001
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: userId and eventId are required
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Event not found

  /events/favorites:
    get:
      tags:
        - Favorites
      summary: List favorite events (legacy)
      description: |
        Legacy endpoint for backward compatibility. Use `/api/events/favorites` instead.
        
        Retrieve all favorite events for a specific user.
      operationId: listFavoritesLegacy
      deprecated: true
      parameters:
        - name: userId
          in: query
          description: User identifier
          required: true
          schema:
            type: string
          example: user123
      responses:
        '200':
          description: List of favorite events retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: Missing required userId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Favorites
      summary: Add favorite event (legacy)
      description: |
        Legacy endpoint for backward compatibility. Use `/api/events/favorites` instead.
        
        Add an event to a user's favorites.
      operationId: addFavoriteLegacy
      deprecated: true
      requestBody:
        description: User and event identifiers
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFavoriteRequest'
      responses:
        '201':
          description: Favorite added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddFavoriteResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/events/favorites/{eventId}:
    delete:
      tags:
        - Favorites
      summary: Remove favorite event
      description: |
        Remove an event from a user's favorites.
        
        This endpoint supports both `/api/events/favorites/{eventId}` (recommended) and `/events/favorites/{eventId}` (legacy) formats.
      operationId: removeFavorite
      parameters:
        - name: eventId
          in: path
          description: Event identifier to remove
          required: true
          schema:
            type: string
          example: event-001
        - name: userId
          in: query
          description: User identifier
          required: true
          schema:
            type: string
          example: user123
      responses:
        '204':
          description: Favorite removed successfully
        '400':
          description: Missing required userId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: userId query parameter is required
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Event not found

  /events/favorites/{eventId}:
    delete:
      tags:
        - Favorites
      summary: Remove favorite event (legacy)
      description: |
        Legacy endpoint for backward compatibility. Use `/api/events/favorites/{eventId}` instead.
        
        Remove an event from a user's favorites.
      operationId: removeFavoriteLegacy
      deprecated: true
      parameters:
        - name: eventId
          in: path
          description: Event identifier to remove
          required: true
          schema:
            type: string
          example: event-001
        - name: userId
          in: query
          description: User identifier
          required: true
          schema:
            type: string
          example: user123
      responses:
        '204':
          description: Favorite removed successfully
        '400':
          description: Missing required userId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Event not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: Health status of the server
          example: ok

    Event:
      type: object
      required:
        - id
        - title
        - organizer
        - venue
        - startTime
        - dances
      properties:
        id:
          type: string
          description: Unique event identifier
          example: event-001
        title:
          type: string
          description: Event title
          example: Prague Salsa Night
        description:
          type: string
          description: Event description
          example: Join us for an amazing night of Salsa dancing!
        organizer:
          type: string
          description: Event organizer name
          example: Prague Salsa Club
        venue:
          $ref: '#/components/schemas/Venue'
        startTime:
          type: string
          format: date-time
          description: Event start time in ISO 8601 format
          example: "2024-02-15T20:00:00Z"
        endTime:
          type: string
          format: date-time
          description: Event end time in ISO 8601 format
          example: "2024-02-16T02:00:00Z"
        duration:
          type: integer
          format: int64
          description: Event duration in milliseconds
          example: 21600000
        dances:
          type: array
          description: List of dance styles featured at the event
          items:
            type: string
          example:
            - Salsa
            - Bachata
        info:
          type: array
          description: Additional event information (prices, URLs, etc.)
          items:
            $ref: '#/components/schemas/EventInfo'
        parts:
          type: array
          description: Event parts (workshops, parties, courses)
          items:
            $ref: '#/components/schemas/EventPart'
        isFavorite:
          type: boolean
          description: Whether the event is marked as favorite for the requesting user
          example: false
        isPast:
          type: boolean
          description: Whether the event has already ended (calculated based on endTime or startTime)
          example: false

    Venue:
      type: object
      required:
        - name
        - address
      properties:
        name:
          type: string
          description: Venue name
          example: Lucerna Music Bar
        address:
          $ref: '#/components/schemas/Address'
        description:
          type: string
          description: Venue description
          example: Historic music venue in the heart of Prague
        latitude:
          type: number
          format: double
          description: Venue latitude coordinate
          example: 50.0813
        longitude:
          type: number
          format: double
          description: Venue longitude coordinate
          example: 14.4258

    Address:
      type: object
      required:
        - street
        - city
        - postalCode
        - country
      properties:
        street:
          type: string
          description: Street address
          example: Vodičkova 36
        city:
          type: string
          description: City name
          example: Prague
        postalCode:
          type: string
          description: Postal code
          example: "110 00"
        country:
          type: string
          description: Country name
          example: Czech Republic

    EventInfo:
      type: object
      required:
        - type
        - key
        - value
      properties:
        type:
          type: string
          enum:
            - price
            - url
            - text
          description: Type of information
          example: price
        key:
          type: string
          description: Information label
          example: Entry Fee
        value:
          type: string
          description: Information value
          example: 200 Kč

    EventPart:
      type: object
      required:
        - name
        - type
        - startTime
      properties:
        name:
          type: string
          description: Part name
          example: Social Dancing
        description:
          type: string
          description: Part description
          example: Open social dancing with live DJ
        type:
          type: string
          enum:
            - party
            - workshop
            - openLesson
            - course
          description: Type of event part
          example: party
        startTime:
          type: string
          format: date-time
          description: Part start time in ISO 8601 format
          example: "2024-02-15T20:00:00Z"
        endTime:
          type: string
          format: date-time
          description: Part end time in ISO 8601 format
          example: "2024-02-16T02:00:00Z"
        djs:
          type: array
          description: List of DJs for this part
          items:
            type: string
          example:
            - DJ Carlos
            - DJ Maria
        lectors:
          type: array
          description: List of instructors/lectors for this part
          items:
            type: string
          example:
            - Maria Rodriguez
            - Carlos Santos

    AddFavoriteRequest:
      type: object
      required:
        - userId
        - eventId
      properties:
        userId:
          type: string
          description: User identifier
          example: user123
        eventId:
          type: string
          description: Event identifier
          example: event-001

    AddFavoriteResponse:
      type: object
      required:
        - message
        - userId
        - eventId
      properties:
        message:
          type: string
          description: Success message
          example: Favorite added successfully
        userId:
          type: string
          description: User identifier
          example: user123
        eventId:
          type: string
          description: Event identifier
          example: event-001

    CreateEventRequest:
      type: object
      required:
        - title
        - organizer
        - venue
        - startTime
        - dances
      properties:
        title:
          type: string
          description: Event title
          example: Prague Salsa Night
        description:
          type: string
          description: Event description
          example: Join us for an amazing night of Salsa dancing!
        organizer:
          type: string
          description: Event organizer name
          example: Prague Salsa Club
        venue:
          $ref: '#/components/schemas/Venue'
        startTime:
          type: string
          format: date-time
          description: Event start time in ISO 8601 format
          example: "2024-02-15T20:00:00Z"
        endTime:
          type: string
          format: date-time
          description: Event end time in ISO 8601 format
          example: "2024-02-16T02:00:00Z"
        duration:
          type: integer
          format: int64
          description: Event duration in milliseconds
          example: 21600000
        dances:
          type: array
          description: List of dance styles featured at the event
          minItems: 1
          items:
            type: string
          example:
            - Salsa
            - Bachata
        info:
          type: array
          description: Additional event information
          items:
            $ref: '#/components/schemas/EventInfo'
        parts:
          type: array
          description: Event parts (workshops, parties, courses)
          items:
            $ref: '#/components/schemas/EventPart'

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message description
          example: userId query parameter is required
