[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:restate-server]
command=/usr/local/bin/restate-server
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:app]
command=bash -c "retries=0; until curl -sf http://localhost:9070/health > /dev/null 2>&1; do retries=$((retries+1)); if [ $retries -ge 30 ]; then echo 'Restate server did not become healthy after 30 retries, exiting'; exit 1; fi; echo 'Waiting for Restate server...'; sleep 1; done && node /app/dist/index.js"
autostart=true
autorestart=true
priority=20
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
