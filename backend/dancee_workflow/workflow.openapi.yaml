openapi: "3.0.3"
info:
  title: dancee_workflow API
  description: |
    Restate-based event processing workflow service for Dancee.
    All endpoints are exposed via the `/api` prefix on the Restate ingress (port 8080).
    The ingress rewrites `/api/*` paths to the corresponding Restate service handlers internally.
  version: "1.0.0"

servers:
  - url: http://localhost:8080
    description: Local development (Restate ingress)

paths:
  /api/event:
    post:
      operationId: processEvent
      summary: Process a single Facebook event
      description: |
        Triggers a durable Restate workflow that scrapes the given Facebook event URL,
        classifies the event type, extracts parts and info via LLM, translates to
        multiple languages, resolves the venue, and stores the result in Directus.
        Returns null if the event type is unsupported or the event already exists.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  description: Facebook event URL to process
                  example: "https://www.facebook.com/events/123456789"
      responses:
        "200":
          description: Event processed successfully (or skipped if duplicate/unsupported)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/DirectusEvent"
                  - type: "null"
        "400":
          description: Missing or empty `url` field in the request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/events/process:
    get:
      operationId: processBatch
      summary: Trigger batch processing of all groups
      description: |
        Starts asynchronous batch processing for all configured groups.
        Immediately returns an acknowledgement; processing continues in the background.
      responses:
        "200":
          description: Batch processing acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  acknowledged:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Batch processing started"

  /api/events/list:
    get:
      operationId: listEvents
      summary: List events from Directus
      description: |
        Returns events from Directus. By default, only published events are returned.
        An explicit `filter` query parameter can be provided to override the default filter.
      parameters:
        - name: filter
          in: query
          required: false
          schema:
            type: string
          description: |
            Optional JSON-encoded Directus filter object. When omitted, defaults to
            `{ "status": { "_eq": "published" } }`.
          example: '{"status":{"_eq":"published"}}'
      responses:
        "200":
          description: List of events matching the filter
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DirectusEvent"

components:
  schemas:
    DirectusEvent:
      type: object
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        original_description:
          type: string
        organizer:
          type: string
        venue:
          oneOf:
            - type: integer
            - type: string
            - type: "null"
        start_time:
          type: string
          format: date-time
        end_time:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
        timezone:
          type: string
        original_url:
          type: string
        parts:
          type: array
          items:
            $ref: "#/components/schemas/EventPart"
        info:
          type: array
          items:
            $ref: "#/components/schemas/EventInfo"
        dances:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [published, draft, archived]
        translation_status:
          type: string
          enum: [complete, partial, missing]
        translations:
          type: array
          items:
            $ref: "#/components/schemas/DirectusEventTranslation"

    EventPart:
      type: object
      required: [name, description, type, dances, date_time_range, lectors, djs]
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [party, workshop, openLesson]
        dances:
          type: array
          items:
            type: string
        date_time_range:
          type: object
          properties:
            start:
              type: string
            end:
              type: string
        lectors:
          type: array
          items:
            type: string
        djs:
          type: array
          items:
            type: string

    EventInfo:
      type: object
      required: [type, key, value]
      properties:
        type:
          type: string
          enum: [url, price]
        key:
          type: string
        value:
          type: string

    DirectusEventTranslation:
      type: object
      required: [languages_code, title, description, parts_translations, info_translations]
      properties:
        id:
          oneOf:
            - type: integer
            - type: string
        events_id:
          oneOf:
            - type: integer
            - type: string
        languages_code:
          type: string
        title:
          type: string
        description:
          type: string
        parts_translations:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
        info_translations:
          type: array
          items:
            type: object
            properties:
              key:
                type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          example: "Missing required field: 'url'"
