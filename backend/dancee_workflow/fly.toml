# fly.toml app configuration file generated for dancee-workflow on 2026-03-30T23:34:51+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'dancee-workflow'
primary_region = 'fra'

[build]

[env]
  APP_PORT = '9080'
  CORS_ORIGINS = '*'
  DIRECTUS_TIMEOUT_MS = '30000'
  IMAGE_GENERATION_MODEL = 'black-forest-labs/flux.2-pro'
  LLM_TEMPERATURE = '0.1'
  NOMINATIM_BASE_URL = 'https://nominatim.openstreetmap.org'
  NOMINATIM_TIMEOUT_MS = '10000'

[http_service]
  internal_port = 9080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
