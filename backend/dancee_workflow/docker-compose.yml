# Note: Directus CMS is managed externally and is NOT included in this compose file.
# Configure the Directus connection via DIRECTUS_BASE_URL and DIRECTUS_ACCESS_TOKEN in .env.
# Run `bun scripts/setup-directus.ts` once to create the required collections and seed languages.

services:
  event-workflow:
    build: .
    ports:
      - "8080:8080"
      - "9070:9070"
      - "9080:9080"
    env_file:
      - .env
    restart: unless-stopped
