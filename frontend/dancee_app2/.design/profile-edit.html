<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Upravit profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            card: '#111827',
                            primary: '#3B82F6',
                            accent: '#A855F7',
                            success: '#22C55E',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl">

    <!-- Header -->
    <header id="EditProfileHeader" class="sticky top-0 z-50 bg-app-bg/90 backdrop-blur-md px-5 pt-12 pb-4 border-b border-app-border">
        <div class="flex items-center justify-between">
            <button class="w-10 h-10 rounded-full bg-app-surface flex items-center justify-center text-app-text hover:bg-app-card transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="text-lg font-semibold">Upravit profil</h1>
            <button class="w-10 h-10 rounded-full bg-app-primary text-white flex items-center justify-center hover:bg-app-primary/80 transition-colors">
                <i class="fa-solid fa-check"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto pb-32">
        
        <!-- Profile Photo Section -->
        <section id="ProfilePhoto" class="px-5 pt-6 pb-6">
            <div class="flex flex-col items-center">
                <div class="relative">
                    <img class="w-24 h-24 rounded-full object-cover border-2 border-app-primary" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-5.jpg" alt="Profilová fotka" />
                    <button class="absolute bottom-0 right-0 w-8 h-8 bg-app-primary rounded-full flex items-center justify-center text-white border-2 border-app-bg">
                        <i class="fa-solid fa-camera text-xs"></i>
                    </button>
                </div>
                <button class="mt-3 text-app-primary font-medium text-sm">Změnit fotku</button>
            </div>
        </section>

        <!-- Personal Information -->
        <section id="PersonalInfo" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Osobní údaje</h3>
            <div class="space-y-4">
                <div class="bg-app-surface border border-app-border rounded-xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-2">Jméno a příjmení</label>
                    <input type="text" value="Tereza Nováková" class="w-full bg-transparent text-app-text placeholder-app-muted border-0 p-0 focus:outline-none focus:ring-0 font-medium">
                </div>
                
                <div class="bg-app-surface border border-app-border rounded-xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-2">E-mail</label>
                    <input type="email" value="tereza.novakova@email.cz" class="w-full bg-transparent text-app-text placeholder-app-muted border-0 p-0 focus:outline-none focus:ring-0">
                </div>
                
                <div class="bg-app-surface border border-app-border rounded-xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-2">Telefon</label>
                    <input type="tel" value="+420 123 456 789" class="w-full bg-transparent text-app-text placeholder-app-muted border-0 p-0 focus:outline-none focus:ring-0">
                </div>
                
                <div class="bg-app-surface border border-app-border rounded-xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-2">Město</label>
                    <input type="text" value="Praha" class="w-full bg-transparent text-app-text placeholder-app-muted border-0 p-0 focus:outline-none focus:ring-0">
                </div>
            </div>
        </section>

        <!-- Bio Section -->
        <section id="Bio" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">O mně</h3>
            <div class="bg-app-surface border border-app-border rounded-xl p-4">
                <label class="block text-xs font-medium text-app-muted mb-2">Popis</label>
                <textarea rows="3" placeholder="Napište něco o sobě..." class="w-full bg-transparent text-app-text placeholder-app-muted border-0 p-0 focus:outline-none focus:ring-0 resize-none">Miluji tanec a poznávání nových lidí. Tancuji už 5 let a stále se učím nové styly.</textarea>
            </div>
        </section>

        <!-- Dance Preferences -->
        <section id="DancePreferences" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Oblíbené tance</h3>
            <div class="bg-app-surface border border-app-border rounded-xl p-4">
                <label class="block text-xs font-medium text-app-muted mb-3">Vyberte své oblíbené tanční styly</label>
                <div class="grid grid-cols-2 gap-3">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" checked class="sr-only peer">
                        <div class="w-5 h-5 border-2 border-app-border rounded peer-checked:bg-app-primary peer-checked:border-app-primary flex items-center justify-center">
                            <i class="fa-solid fa-check text-white text-xs hidden peer-checked:block"></i>
                        </div>
                        <span class="text-sm text-app-text">Salsa</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" checked class="sr-only peer">
                        <div class="w-5 h-5 border-2 border-app-border rounded peer-checked:bg-app-primary peer-checked:border-app-primary flex items-center justify-center">
                            <i class="fa-solid fa-check text-white text-xs hidden peer-checked:block"></i>
                        </div>
                        <span class="text-sm text-app-text">Bachata</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" checked class="sr-only peer">
                        <div class="w-5 h-5 border-2 border-app-border rounded peer-checked:bg-app-primary peer-checked:border-app-primary flex items-center justify-center">
                            <i class="fa-solid fa-check text-white text-xs hidden peer-checked:block"></i>
                        </div>
                        <span class="text-sm text-app-text">Zouk</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="sr-only peer">
                        <div class="w-5 h-5 border-2 border-app-border rounded peer-checked:bg-app-primary peer-checked:border-app-primary flex items-center justify-center">
                            <i class="fa-solid fa-check text-white text-xs hidden peer-checked:block"></i>
                        </div>
                        <span class="text-sm text-app-text">Kizomba</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="sr-only peer">
                        <div class="w-5 h-5 border-2 border-app-border rounded peer-checked:bg-app-primary peer-checked:border-app-primary flex items-center justify-center">
                            <i class="fa-solid fa-check text-white text-xs hidden peer-checked:block"></i>
                        </div>
                        <span class="text-sm text-app-text">Tango</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" class="sr-only peer">
                        <div class="w-5 h-5 border-2 border-app-border rounded peer-checked:bg-app-primary peer-checked:border-app-primary flex items-center justify-center">
                            <i class="fa-solid fa-check text-white text-xs hidden peer-checked:block"></i>
                        </div>
                        <span class="text-sm text-app-text">Swing</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- Experience Level -->
        <section id="ExperienceLevel" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Úroveň</h3>
            <div class="bg-app-surface border border-app-border rounded-xl p-4">
                <label class="block text-xs font-medium text-app-muted mb-3">Vaše taneční úroveň</label>
                <div class="space-y-3">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="radio" name="level" class="sr-only peer">
                        <div class="w-4 h-4 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                            <div class="w-2 h-2 bg-app-primary rounded-full hidden peer-checked:block"></div>
                        </div>
                        <span class="text-sm text-app-text">Začátečník</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="radio" name="level" checked class="sr-only peer">
                        <div class="w-4 h-4 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                            <div class="w-2 h-2 bg-app-primary rounded-full hidden peer-checked:block"></div>
                        </div>
                        <span class="text-sm text-app-text">Mírně pokročilý</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="radio" name="level" class="sr-only peer">
                        <div class="w-4 h-4 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                            <div class="w-2 h-2 bg-app-primary rounded-full hidden peer-checked:block"></div>
                        </div>
                        <span class="text-sm text-app-text">Pokročilý</span>
                    </label>
                    
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="radio" name="level" class="sr-only peer">
                        <div class="w-4 h-4 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                            <div class="w-2 h-2 bg-app-primary rounded-full hidden peer-checked:block"></div>
                        </div>
                        <span class="text-sm text-app-text">Expert</span>
                    </label>
                </div>
            </div>
        </section>

        <!-- Social Links -->
        <section id="SocialLinks" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Sociální sítě</h3>
            <div class="space-y-4">
                <div class="bg-app-surface border border-app-border rounded-xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-2">Instagram</label>
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-instagram text-app-muted"></i>
                        <input type="text" placeholder="@vase_uzivatelske_jmeno" class="flex-1 bg-transparent text-app-text placeholder-app-muted border-0 p-0 focus:outline-none focus:ring-0">
                    </div>
                </div>
                
                <div class="bg-app-surface border border-app-border rounded-xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-2">Facebook</label>
                    <div class="flex items-center gap-3">
                        <i class="fa-brands fa-facebook text-app-muted"></i>
                        <input type="text" placeholder="facebook.com/vase.jmeno" class="flex-1 bg-transparent text-app-text placeholder-app-muted border-0 p-0 focus:outline-none focus:ring-0">
                    </div>
                </div>
            </div>
        </section>

        <!-- Notification Preferences -->
        <section id="NotificationPreferences" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Oznámení</h3>
            <div class="bg-app-surface border border-app-border rounded-xl overflow-hidden">
                <div class="flex items-center justify-between p-4">
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Nové akce</p>
                        <p class="text-xs text-app-muted">Upozornění na nové taneční akce</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-app-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-app-primary"></div>
                    </label>
                </div>
                
                <div class="border-t border-app-border"></div>
                
                <div class="flex items-center justify-between p-4">
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Připomínky akcí</p>
                        <p class="text-xs text-app-muted">Připomenout uložené akce</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-app-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-app-primary"></div>
                    </label>
                </div>
                
                <div class="border-t border-app-border"></div>
                
                <div class="flex items-center justify-between p-4">
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Marketingové zprávy</p>
                        <p class="text-xs text-app-muted">Tipy a novinky o tancování</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" class="sr-only peer">
                        <div class="w-11 h-6 bg-app-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-app-primary"></div>
                    </label>
                </div>
            </div>
        </section>

    </main>

    <!-- Save Button -->
    <div id="SaveButton" class="fixed bottom-20 left-0 right-0 px-5 z-40">
        <div class="max-w-[430px] mx-auto">
            <button class="w-full bg-app-primary text-white font-semibold py-4 rounded-xl hover:bg-app-primary/90 transition-colors">
                Uložit změny
            </button>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav id="BottomNavigation" class="fixed bottom-0 w-full max-w-[430px] bg-app-card/95 backdrop-blur-lg border-t border-app-border pb-safe pt-2 px-6 pb-6 z-50 rounded-t-3xl">
        <ul class="flex justify-between items-center">
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[10px] font-medium">Domů</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    <span class="text-[10px] font-medium">Hledat</span>
                </a>
            </li>
            <li class="relative -top-5">
                <a href="#" class="flex items-center justify-center w-14 h-14 bg-app-primary text-white rounded-full shadow-glow border-4 border-app-bg transform hover:scale-105 transition-transform">
                    <i class="fa-solid fa-plus text-xl"></i>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-heart text-xl"></i>
                    <span class="text-[10px] font-medium">Uložené</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-primary">
                    <i class="fa-solid fa-user text-xl"></i>
                    <span class="text-[10px] font-medium">Profil</span>
                </a>
            </li>
        </ul>
    </nav>

</body>
</html>
