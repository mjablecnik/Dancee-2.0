<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            card: '#111827',
                            primary: '#3B82F6',
                            accent: '#A855F7',
                            success: '#22C55E',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
                        'glow-accent': '0 0 20px -5px rgba(168, 85, 247, 0.5)',
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .floating-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        .gradient-border {
            background: linear-gradient(135deg, #3B82F6, #A855F7);
            border-radius: 16px;
            padding: 1px;
        }
        .gradient-border-inner {
            background: #1E293B;
            border-radius: 15px;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl overflow-hidden">

<div id="LoginBackground" class="absolute inset-0 overflow-hidden">
    <div class="absolute top-20 left-10 w-32 h-32 bg-app-primary/20 rounded-full blur-3xl floating-animation"></div>
    <div class="absolute top-60 right-8 w-24 h-24 bg-app-accent/20 rounded-full blur-2xl floating-animation" style="animation-delay: -1s;"></div>
    <div class="absolute bottom-40 left-6 w-20 h-20 bg-app-success/20 rounded-full blur-2xl floating-animation" style="animation-delay: -2s;"></div>
</div>

<main class="relative z-10 flex-1 flex flex-col justify-center px-6 py-8">
    
    <section id="LoginHeader" class="text-center mb-12">
        <div class="mb-8">
            <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-br from-app-primary to-app-accent rounded-2xl flex items-center justify-center shadow-glow">
                <i class="fa-solid fa-user-music text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-app-primary to-app-accent bg-clip-text text-transparent mb-3">Dancee</h1>
            <p class="text-app-muted text-lg font-medium">Objevuj taneční svět</p>
        </div>
        
        <div class="space-y-2">
            <h2 class="text-2xl font-bold text-app-text">Vítej zpět!</h2>
            <p class="text-app-muted">Přihlaš se a pokračuj v objevování tanečních akcí</p>
        </div>
    </section>

    <section id="LoginForm" class="space-y-6">
        
        <div class="space-y-4">
            <div class="space-y-2">
                <label class="text-sm font-semibold text-app-text block">E-mail</label>
                <div class="relative">
                    <input type="email" placeholder="tvuj@email.cz" class="w-full h-14 pl-12 pr-4 bg-app-surface border border-app-border rounded-2xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted"></i>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-app-text block">Heslo</label>
                <div class="relative">
                    <input type="password" placeholder="••••••••" class="w-full h-14 pl-12 pr-12 bg-app-surface border border-app-border rounded-2xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted"></i>
                    <button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-app-muted hover:text-app-primary transition-colors">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between pt-2">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" class="w-5 h-5 rounded border-2 border-app-border bg-app-surface checked:bg-app-primary checked:border-app-primary focus:ring-2 focus:ring-app-primary/20 transition-all">
                    <span class="text-sm text-app-muted">Zůstat přihlášen</span>
                </label>
                <button class="text-sm text-app-primary hover:text-app-primary/80 font-medium transition-colors">
                    Zapomenuté heslo?
                </button>
            </div>
        </div>

        <button class="w-full h-14 bg-gradient-to-r from-app-primary to-app-accent text-white font-bold rounded-2xl shadow-glow hover:shadow-glow-accent transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
            Přihlásit se
        </button>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-app-border"></div>
            </div>
            <div class="relative flex justify-center">
                <span class="px-4 text-sm text-app-muted bg-app-bg">nebo pokračuj s</span>
            </div>
        </div>

        <div class="space-y-3">
            <button class="w-full h-14 bg-app-surface border border-app-border rounded-2xl flex items-center justify-center gap-3 hover:bg-app-card transition-colors group">
                <i class="fa-brands fa-google text-xl text-red-500 group-hover:scale-110 transition-transform"></i>
                <span class="font-semibold text-app-text">Pokračovat s Google</span>
            </button>

            <button class="w-full h-14 bg-app-surface border border-app-border rounded-2xl flex items-center justify-center gap-3 hover:bg-app-card transition-colors group">
                <i class="fa-brands fa-apple text-xl text-app-text group-hover:scale-110 transition-transform"></i>
                <span class="font-semibold text-app-text">Pokračovat s Apple</span>
            </button>
        </div>

        <div class="text-center pt-6 space-y-4">
            <p class="text-sm text-app-muted">
                Nemáš ještě účet? 
                <button class="text-app-primary hover:text-app-primary/80 font-semibold transition-colors ml-1">
                    Zaregistruj se
                </button>
            </p>
            
            <div class="pt-4 border-t border-app-border">
                <p class="text-xs text-app-muted leading-relaxed">
                    Pokračováním souhlasíš s našimi 
                    <button class="text-app-primary hover:underline">Podmínkami používání</button>
                    a 
                    <button class="text-app-primary hover:underline">Zásadami ochrany osobních údajů</button>
                </p>
            </div>
        </div>
    </section>

</main>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.querySelector('input[type="password"]');
    const eyeButton = passwordInput.nextElementSibling;
    const eyeIcon = eyeButton.querySelector('i');
    
    eyeButton.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.className = 'fa-regular fa-eye-slash';
        } else {
            passwordInput.type = 'password';
            eyeIcon.className = 'fa-regular fa-eye';
        }
    });
});
</script>

</body>
</html>
