<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zapomenuté heslo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            card: '#111827',
                            primary: '#3B82F6',
                            accent: '#A855F7',
                            success: '#22C55E',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
                        'glow-accent': '0 0 20px -5px rgba(168, 85, 247, 0.5)',
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .floating-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        .gradient-border {
            background: linear-gradient(135deg, #3B82F6, #A855F7);
            border-radius: 16px;
            padding: 1px;
        }
        .gradient-border-inner {
            background: #1E293B;
            border-radius: 15px;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl overflow-hidden">

<div id="ForgotPasswordBackground" class="absolute inset-0 overflow-hidden">
    <div class="absolute top-20 left-10 w-32 h-32 bg-app-primary/20 rounded-full blur-3xl floating-animation"></div>
    <div class="absolute top-60 right-8 w-24 h-24 bg-app-accent/20 rounded-full blur-2xl floating-animation" style="animation-delay: -1s;"></div>
    <div class="absolute bottom-40 left-6 w-20 h-20 bg-app-success/20 rounded-full blur-2xl floating-animation" style="animation-delay: -2s;"></div>
</div>

<header id="header" class="relative z-10 px-6 pt-8 pb-4">
    <button class="w-11 h-11 bg-app-surface border border-app-border rounded-xl flex items-center justify-center hover:bg-app-card transition-colors active:scale-95">
        <i class="fa-solid fa-arrow-left text-app-text"></i>
    </button>
</header>

<main class="relative z-10 flex-1 flex flex-col justify-center px-6 py-8">
    
    <section id="ForgotPasswordHeader" class="text-center mb-12">
        <div class="mb-8">
            <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-br from-app-primary to-app-accent rounded-2xl flex items-center justify-center shadow-glow">
                <i class="fa-solid fa-key text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold bg-gradient-to-r from-app-primary to-app-accent bg-clip-text text-transparent mb-3">Dancee</h1>
        </div>
        
        <div class="space-y-3">
            <h2 class="text-2xl font-bold text-app-text">Zapomenuté heslo?</h2>
            <p class="text-app-muted leading-relaxed px-4">Zadej svůj e-mail a pošleme ti odkaz pro obnovení hesla</p>
        </div>
    </section>

    <section id="ForgotPasswordForm" class="space-y-6">
        
        <div class="space-y-2">
            <label class="text-sm font-semibold text-app-text block">E-mail</label>
            <div class="relative">
                <input type="email" placeholder="tvuj@email.cz" class="w-full h-14 pl-12 pr-4 bg-app-surface border border-app-border rounded-2xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                <i class="fa-regular fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted"></i>
            </div>
        </div>

        <button class="w-full h-14 bg-gradient-to-r from-app-primary to-app-accent text-white font-bold rounded-2xl shadow-glow hover:shadow-glow-accent transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
            Odeslat odkaz
        </button>

        <div class="bg-app-surface border border-app-border rounded-2xl p-5 space-y-3">
            <div class="flex items-start gap-3">
                <div class="w-10 h-10 bg-app-primary/10 rounded-xl flex items-center justify-center flex-shrink-0">
                    <i class="fa-solid fa-circle-info text-app-primary"></i>
                </div>
                <div class="flex-1 space-y-2">
                    <h3 class="text-sm font-semibold text-app-text">Zkontroluj svou e-mailovou schránku</h3>
                    <p class="text-xs text-app-muted leading-relaxed">Po odeslání obdržíš e-mail s odkazem pro obnovení hesla. Odkaz je platný 24 hodin.</p>
                </div>
            </div>
        </div>

        <div class="text-center pt-4">
            <p class="text-sm text-app-muted">
                Vzpomněl sis na heslo? 
                <button class="text-app-primary hover:text-app-primary/80 font-semibold transition-colors ml-1">
                    Přihlásit se
                </button>
            </p>
        </div>

        <div class="pt-8 space-y-4">
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-app-border"></div>
                </div>
                <div class="relative flex justify-center">
                    <span class="px-4 text-sm text-app-muted bg-app-bg">Potřebuješ pomoc?</span>
                </div>
            </div>

            <div class="flex gap-3">
                <button class="flex-1 h-12 bg-app-surface border border-app-border rounded-xl flex items-center justify-center gap-2 hover:bg-app-card transition-colors group">
                    <i class="fa-solid fa-headset text-app-primary group-hover:scale-110 transition-transform"></i>
                    <span class="text-sm font-semibold text-app-text">Podpora</span>
                </button>
                <button class="flex-1 h-12 bg-app-surface border border-app-border rounded-xl flex items-center justify-center gap-2 hover:bg-app-card transition-colors group">
                    <i class="fa-solid fa-circle-question text-app-accent group-hover:scale-110 transition-transform"></i>
                    <span class="text-sm font-semibold text-app-text">FAQ</span>
                </button>
            </div>
        </div>

    </section>

</main>

</body>
</html>
