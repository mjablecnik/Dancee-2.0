<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lokalita</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            card: '#111827',
                            primary: '#3B82F6',
                            accent: '#A855F7',
                            success: '#22C55E',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl">

    <!-- Header -->
    <header id="LocationHeader" class="sticky top-0 z-50 bg-app-bg/90 backdrop-blur-md px-5 pt-12 pb-4 border-b border-app-border">
        <div class="flex items-center gap-4 mb-6">
            <button class="w-10 h-10 rounded-full bg-app-surface flex items-center justify-center text-app-muted hover:text-app-primary transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="text-xl font-bold text-app-text">Vybrat lokalitu</h1>
        </div>

        <!-- Search Location -->
        <div id="LocationSearch" class="relative">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-app-muted"></i>
            <input type="text" placeholder="Hledat město nebo oblast..." class="w-full bg-app-surface border border-app-border rounded-xl py-3 pl-11 pr-4 text-sm text-app-text placeholder:text-app-muted focus:outline-none focus:border-app-primary transition-colors">
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto pb-24 px-5 pt-6">

        <!-- Current Location -->
        <section id="CurrentLocation" class="mb-8">
            <button class="w-full bg-app-surface border border-app-border rounded-xl p-4 flex items-center gap-4 hover:bg-app-card transition-colors">
                <div class="w-12 h-12 rounded-full bg-app-primary/20 flex items-center justify-center">
                    <i class="fa-solid fa-location-crosshairs text-app-primary text-lg"></i>
                </div>
                <div class="flex-1 text-left">
                    <h3 class="font-semibold text-app-text">Použít moji polohu</h3>
                    <p class="text-sm text-app-muted">Automaticky najde akce ve vašem okolí</p>
                </div>
                <i class="fa-solid fa-chevron-right text-app-muted"></i>
            </button>
        </section>

        <!-- Popular Cities -->
        <section id="PopularCities" class="mb-8">
            <h2 class="text-lg font-bold mb-4 text-app-text">Oblíbená města</h2>
            <div class="space-y-3">
                <!-- Praha -->
                <button class="w-full bg-app-surface border border-app-border rounded-xl p-4 flex items-center gap-4 hover:bg-app-card transition-colors">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-app-primary to-app-accent flex items-center justify-center">
                        <i class="fa-solid fa-building text-white"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="font-semibold text-app-text">Praha</h3>
                        <p class="text-sm text-app-muted">125 nadcházejících akcí</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-1 bg-app-primary/20 text-app-primary text-xs font-medium rounded">Aktuální</span>
                        <i class="fa-solid fa-chevron-right text-app-muted"></i>
                    </div>
                </button>

                <!-- Brno -->
                <button class="w-full bg-app-surface border border-app-border rounded-xl p-4 flex items-center gap-4 hover:bg-app-card transition-colors">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center">
                        <i class="fa-solid fa-city text-white"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="font-semibold text-app-text">Brno</h3>
                        <p class="text-sm text-app-muted">47 nadcházejících akcí</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>

                <!-- Ostrava -->
                <button class="w-full bg-app-surface border border-app-border rounded-xl p-4 flex items-center gap-4 hover:bg-app-card transition-colors">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-orange-500 to-red-600 flex items-center justify-center">
                        <i class="fa-solid fa-industry text-white"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="font-semibold text-app-text">Ostrava</h3>
                        <p class="text-sm text-app-muted">23 nadcházejících akcí</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>

                <!-- Plzen -->
                <button class="w-full bg-app-surface border border-app-border rounded-xl p-4 flex items-center gap-4 hover:bg-app-card transition-colors">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-yellow-500 to-amber-600 flex items-center justify-center">
                        <i class="fa-solid fa-beer-mug-empty text-white"></i>
                    </div>
                    <div class="flex-1 text-left">
                        <h3 class="font-semibold text-app-text">Plzeň</h3>
                        <p class="text-sm text-app-muted">18 nadcházejících akcí</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
            </div>
        </section>

        <!-- All Cities -->
        <section id="AllCities" class="mb-8">
            <h2 class="text-lg font-bold mb-4 text-app-text">Všechna města</h2>
            <div class="space-y-2">
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Bratislava, SK</span>
                    <span class="text-sm text-app-muted">12 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Bratislava, SK</span>
                    <span class="text-sm text-app-muted">12 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">České Budějovice</span>
                    <span class="text-sm text-app-muted">8 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Hradec Králové</span>
                    <span class="text-sm text-app-muted">6 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Jihlava</span>
                    <span class="text-sm text-app-muted">4 akce</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Karlovy Vary</span>
                    <span class="text-sm text-app-muted">3 akce</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Liberec</span>
                    <span class="text-sm text-app-muted">9 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Olomouc</span>
                    <span class="text-sm text-app-muted">14 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Pardubice</span>
                    <span class="text-sm text-app-muted">5 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Ústí nad Labem</span>
                    <span class="text-sm text-app-muted">7 akcí</span>
                </button>
                <button class="w-full text-left px-4 py-3 hover:bg-app-surface rounded-lg transition-colors flex justify-between items-center">
                    <span class="text-app-text">Zlín</span>
                    <span class="text-sm text-app-muted">11 akcí</span>
                </button>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav id="BottomNavigation" class="fixed bottom-0 w-full max-w-[430px] bg-app-card/95 backdrop-blur-lg border-t border-app-border pb-safe pt-2 px-6 pb-6 z-50 rounded-t-3xl">
        <ul class="flex justify-between items-center">
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[10px] font-medium">Domů</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    <span class="text-[10px] font-medium">Hledat</span>
                </a>
            </li>
            <li class="relative -top-5">
                <a href="#" class="flex items-center justify-center w-14 h-14 bg-app-primary text-white rounded-full shadow-glow border-4 border-app-bg transform hover:scale-105 transition-transform">
                    <i class="fa-solid fa-plus text-xl"></i>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-red-500 transition-colors">
                    <i class="fa-regular fa-heart text-xl"></i>
                    <span class="text-[10px] font-medium">Uložené</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-regular fa-user text-xl"></i>
                    <span class="text-[10px] font-medium">Profil</span>
                </a>
            </li>
        </ul>
    </nav>

</body>
</html>
