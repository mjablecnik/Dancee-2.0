<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            card: '#111827',
                            primary: '#3B82F6',
                            accent: '#A855F7',
                            success: '#22C55E',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
                        'glow-accent': '0 0 20px -5px rgba(168, 85, 247, 0.5)',
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .floating-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        .gradient-border {
            background: linear-gradient(135deg, #3B82F6, #A855F7);
            border-radius: 16px;
            padding: 1px;
        }
        .gradient-border-inner {
            background: #1E293B;
            border-radius: 15px;
            width: 100%;
            height: 100%;
        }
        .strength-indicator {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl overflow-hidden">

<div id="RegisterBackground" class="absolute inset-0 overflow-hidden">
    <div class="absolute top-20 left-10 w-32 h-32 bg-app-primary/20 rounded-full blur-3xl floating-animation"></div>
    <div class="absolute top-60 right-8 w-24 h-24 bg-app-accent/20 rounded-full blur-2xl floating-animation" style="animation-delay: -1s;"></div>
    <div class="absolute bottom-40 left-6 w-20 h-20 bg-app-success/20 rounded-full blur-2xl floating-animation" style="animation-delay: -2s;"></div>
</div>

<main class="relative z-10 flex-1 flex flex-col px-6 py-8 overflow-y-auto hide-scrollbar">
    
    <section id="RegisterHeader" class="text-center mb-8">
        <div class="mb-6">
            <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-app-primary to-app-accent rounded-2xl flex items-center justify-center shadow-glow">
                <i class="fa-solid fa-music text-2xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-app-primary to-app-accent bg-clip-text text-transparent mb-2">Dancee</h1>
            <p class="text-app-muted text-base font-medium">Objevuj taneční svět</p>
        </div>
        
        <div class="space-y-1">
            <h2 class="text-xl font-bold text-app-text">Vytvoř si účet</h2>
            <p class="text-app-muted text-sm">Zaregistruj se a začni objevovat taneční akce</p>
        </div>
    </section>

    <section id="RegisterForm" class="space-y-5 mb-6">
        
        <div class="space-y-4">
            <div class="space-y-2">
                <label class="text-sm font-semibold text-app-text block">Jméno</label>
                <div class="relative">
                    <input type="text" placeholder="Tvoje jméno" class="w-full h-12 pl-11 pr-4 bg-app-surface border border-app-border rounded-xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                    <i class="fa-regular fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted text-sm"></i>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-app-text block">Příjmení</label>
                <div class="relative">
                    <input type="text" placeholder="Tvoje příjmení" class="w-full h-12 pl-11 pr-4 bg-app-surface border border-app-border rounded-xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                    <i class="fa-regular fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted text-sm"></i>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-app-text block">E-mail</label>
                <div class="relative">
                    <input type="email" placeholder="tvuj@email.cz" class="w-full h-12 pl-11 pr-4 bg-app-surface border border-app-border rounded-xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                    <i class="fa-regular fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted text-sm"></i>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-app-text block">Heslo</label>
                <div class="relative">
                    <input type="password" id="password" placeholder="••••••••" class="w-full h-12 pl-11 pr-11 bg-app-surface border border-app-border rounded-xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted text-sm"></i>
                    <button type="button" id="togglePassword" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-app-muted hover:text-app-primary transition-colors">
                        <i class="fa-regular fa-eye text-sm"></i>
                    </button>
                </div>
                <div class="flex gap-1 mt-2">
                    <div id="strength1" class="flex-1 strength-indicator bg-app-border"></div>
                    <div id="strength2" class="flex-1 strength-indicator bg-app-border"></div>
                    <div id="strength3" class="flex-1 strength-indicator bg-app-border"></div>
                    <div id="strength4" class="flex-1 strength-indicator bg-app-border"></div>
                </div>
                <p id="strengthText" class="text-xs text-app-muted mt-1">Alespoň 8 znaků</p>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-app-text block">Potvrzení hesla</label>
                <div class="relative">
                    <input type="password" id="confirmPassword" placeholder="••••••••" class="w-full h-12 pl-11 pr-11 bg-app-surface border border-app-border rounded-xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-app-muted text-sm"></i>
                    <button type="button" id="toggleConfirmPassword" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-app-muted hover:text-app-primary transition-colors">
                        <i class="fa-regular fa-eye text-sm"></i>
                    </button>
                </div>
                <p id="matchText" class="text-xs text-app-muted mt-1 hidden">Hesla se neshodují</p>
            </div>

            <div class="pt-2">
                <label class="flex items-start gap-3 cursor-pointer">
                    <input type="checkbox" class="w-5 h-5 mt-0.5 rounded border-2 border-app-border bg-app-surface checked:bg-app-primary checked:border-app-primary focus:ring-2 focus:ring-app-primary/20 transition-all">
                    <span class="text-sm text-app-muted leading-relaxed">
                        Souhlasím s 
                        <button class="text-app-primary hover:underline">Podmínkami používání</button>
                        a 
                        <button class="text-app-primary hover:underline">Zásadami ochrany osobních údajů</button>
                    </span>
                </label>
            </div>

            <div class="pt-1">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" class="w-5 h-5 rounded border-2 border-app-border bg-app-surface checked:bg-app-primary checked:border-app-primary focus:ring-2 focus:ring-app-primary/20 transition-all">
                    <span class="text-sm text-app-muted">Chci dostávat novinky o tanečních akcích</span>
                </label>
            </div>
        </div>

        <button class="w-full h-12 bg-gradient-to-r from-app-primary to-app-accent text-white font-bold rounded-xl shadow-glow hover:shadow-glow-accent transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
            Vytvořit účet
        </button>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-app-border"></div>
            </div>
            <div class="relative flex justify-center">
                <span class="px-4 text-sm text-app-muted bg-app-bg">nebo se zaregistruj s</span>
            </div>
        </div>

        <div class="space-y-3">
            <button class="w-full h-12 bg-app-surface border border-app-border rounded-xl flex items-center justify-center gap-3 hover:bg-app-card transition-colors group">
                <i class="fa-brands fa-google text-lg text-red-500 group-hover:scale-110 transition-transform"></i>
                <span class="font-semibold text-app-text">Pokračovat s Google</span>
            </button>

            <button class="w-full h-12 bg-app-surface border border-app-border rounded-xl flex items-center justify-center gap-3 hover:bg-app-card transition-colors group">
                <i class="fa-brands fa-apple text-lg text-app-text group-hover:scale-110 transition-transform"></i>
                <span class="font-semibold text-app-text">Pokračovat s Apple</span>
            </button>
        </div>

        <div class="text-center pt-4">
            <p class="text-sm text-app-muted">
                Už máš účet? 
                <button class="text-app-primary hover:text-app-primary/80 font-semibold transition-colors ml-1">
                    Přihlaš se
                </button>
            </p>
        </div>
    </section>

</main>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const togglePassword = document.getElementById('togglePassword');
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const strengthText = document.getElementById('strengthText');
    const matchText = document.getElementById('matchText');
    
    function togglePasswordVisibility(input, button) {
        const icon = button.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'fa-regular fa-eye-slash text-sm';
        } else {
            input.type = 'password';
            icon.className = 'fa-regular fa-eye text-sm';
        }
    }
    
    togglePassword.addEventListener('click', () => {
        togglePasswordVisibility(passwordInput, togglePassword);
    });
    
    toggleConfirmPassword.addEventListener('click', () => {
        togglePasswordVisibility(confirmPasswordInput, toggleConfirmPassword);
    });
    
    function updatePasswordStrength(password) {
        const indicators = [
            document.getElementById('strength1'),
            document.getElementById('strength2'),
            document.getElementById('strength3'),
            document.getElementById('strength4')
        ];
        
        let strength = 0;
        let strengthLabel = 'Slabé heslo';
        let strengthColor = '#ef4444';
        
        if (password.length >= 8) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z\d]/.test(password)) strength++;
        
        switch(strength) {
            case 0:
            case 1:
                strengthLabel = 'Slabé heslo';
                strengthColor = '#ef4444';
                break;
            case 2:
                strengthLabel = 'Středně silné';
                strengthColor = '#f59e0b';
                break;
            case 3:
                strengthLabel = 'Silné heslo';
                strengthColor = '#22c55e';
                break;
            case 4:
                strengthLabel = 'Velmi silné';
                strengthColor = '#22c55e';
                break;
        }
        
        indicators.forEach((indicator, index) => {
            if (index < strength) {
                indicator.style.backgroundColor = strengthColor;
            } else {
                indicator.style.backgroundColor = '#334155';
            }
        });
        
        strengthText.textContent = strengthLabel;
        strengthText.style.color = strengthColor;
    }
    
    function checkPasswordMatch() {
        if (confirmPasswordInput.value === '') {
            matchText.classList.add('hidden');
            return;
        }
        
        if (passwordInput.value !== confirmPasswordInput.value) {
            matchText.classList.remove('hidden');
            matchText.style.color = '#ef4444';
            matchText.textContent = 'Hesla se neshodují';
        } else {
            matchText.classList.remove('hidden');
            matchText.style.color = '#22c55e';
            matchText.textContent = 'Hesla se shodují';
        }
    }
    
    passwordInput.addEventListener('input', function() {
        updatePasswordStrength(this.value);
        checkPasswordMatch();
    });
    
    confirmPasswordInput.addEventListener('input', checkPasswordMatch);
});
</script>

</body>
</html>
