<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.FontAwesomeConfig = { autoReplaceSvg: 'nest' };
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            card: '#111827',
                            primary: '#3B82F6',
                            accent: '#A855F7',
                            success: '#22C55E',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
                        'glow-accent': '0 0 20px -5px rgba(168, 85, 247, 0.5)',
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        .floating-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(2deg); }
        }
        .step-indicator {
            transition: all 0.3s ease;
        }
        .step-indicator.active {
            background: linear-gradient(135deg, #3B82F6, #A855F7);
        }
        .step-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .step-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl overflow-hidden">

<div id="OnboardingBackground" class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-20 left-10 w-32 h-32 bg-app-primary/20 rounded-full blur-3xl floating-animation"></div>
    <div class="absolute top-60 right-8 w-24 h-24 bg-app-accent/20 rounded-full blur-2xl floating-animation" style="animation-delay: -1s;"></div>
    <div class="absolute bottom-40 left-6 w-20 h-20 bg-app-success/20 rounded-full blur-2xl floating-animation" style="animation-delay: -2s;"></div>
</div>

<main class="relative z-10 flex-1 flex flex-col px-6 py-8 overflow-y-auto hide-scrollbar">
    
    <section id="OnboardingHeader" class="mb-8">
        <div class="flex items-center justify-between mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-app-primary to-app-accent rounded-2xl flex items-center justify-center shadow-glow">
                <i class="fa-solid fa-music text-2xl text-white"></i>
            </div>
            <button id="skipButton" class="text-app-muted hover:text-app-primary font-medium text-sm transition-colors">
                Přeskočit
            </button>
        </div>
        
        <div class="flex gap-2 mb-6">
            <div class="step-indicator h-1.5 flex-1 rounded-full bg-app-border active"></div>
            <div class="step-indicator h-1.5 flex-1 rounded-full bg-app-border"></div>
            <div class="step-indicator h-1.5 flex-1 rounded-full bg-app-border"></div>
        </div>
    </section>

    <section id="Step1" class="step-content active flex-1 flex flex-col">
        <div class="flex-1">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-app-text mb-2">Jaké tance tě baví?</h2>
                <p class="text-app-muted text-sm">Vyber své oblíbené taneční styly, abychom ti mohli nabídnout relevantní akce</p>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-fire text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Salsa</span>
                    </div>
                </label>

                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-heart text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Bachata</span>
                    </div>
                </label>

                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-water text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Zouk</span>
                    </div>
                </label>

                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-moon text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Kizomba</span>
                    </div>
                </label>

                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-rose text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Tango</span>
                    </div>
                </label>

                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-music text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Swing</span>
                    </div>
                </label>

                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-bolt text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Hip Hop</span>
                    </div>
                </label>

                <label class="dance-option cursor-pointer">
                    <input type="checkbox" class="sr-only peer">
                    <div class="h-24 bg-app-surface border-2 border-app-border rounded-2xl flex flex-col items-center justify-center gap-2 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <i class="fa-solid fa-star text-2xl text-app-muted peer-checked:text-app-primary"></i>
                        <span class="text-sm font-semibold text-app-text">Jiné</span>
                    </div>
                </label>
            </div>
        </div>

        <button id="nextStep1" class="w-full h-12 bg-gradient-to-r from-app-primary to-app-accent text-white font-bold rounded-xl shadow-glow hover:shadow-glow-accent transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98] mt-4">
            Pokračovat
        </button>
    </section>

    <section id="Step2" class="step-content flex-1 flex flex-col">
        <div class="flex-1">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-app-text mb-2">Jaká je tvoje úroveň?</h2>
                <p class="text-app-muted text-sm">Pomůže nám to doporučit ti vhodné akce a kurzy</p>
            </div>

            <div class="space-y-3 mb-6">
                <label class="level-option cursor-pointer block">
                    <input type="radio" name="level" class="sr-only peer">
                    <div class="bg-app-surface border-2 border-app-border rounded-2xl p-5 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-app-card rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-seedling text-xl text-app-success"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-semibold text-app-text mb-1">Začátečník</h3>
                                <p class="text-xs text-app-muted">Teprve začínám s tancem</p>
                            </div>
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                        </div>
                    </div>
                </label>

                <label class="level-option cursor-pointer block">
                    <input type="radio" name="level" class="sr-only peer">
                    <div class="bg-app-surface border-2 border-app-border rounded-2xl p-5 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-app-card rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-chart-line text-xl text-app-primary"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-semibold text-app-text mb-1">Mírně pokročilý</h3>
                                <p class="text-xs text-app-muted">Mám základní zkušenosti</p>
                            </div>
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                        </div>
                    </div>
                </label>

                <label class="level-option cursor-pointer block">
                    <input type="radio" name="level" class="sr-only peer">
                    <div class="bg-app-surface border-2 border-app-border rounded-2xl p-5 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-app-card rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-fire text-xl text-app-accent"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-semibold text-app-text mb-1">Pokročilý</h3>
                                <p class="text-xs text-app-muted">Tančím pravidelně několik let</p>
                            </div>
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                        </div>
                    </div>
                </label>

                <label class="level-option cursor-pointer block">
                    <input type="radio" name="level" class="sr-only peer">
                    <div class="bg-app-surface border-2 border-app-border rounded-2xl p-5 transition-all peer-checked:border-app-primary peer-checked:bg-app-primary/10 hover:border-app-primary/50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-app-card rounded-xl flex items-center justify-center">
                                <i class="fa-solid fa-crown text-xl text-yellow-500"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="font-semibold text-app-text mb-1">Expert</h3>
                                <p class="text-xs text-app-muted">Profesionální úroveň</p>
                            </div>
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                        </div>
                    </div>
                </label>
            </div>
        </div>

        <div class="flex gap-3 mt-4">
            <button id="backStep2" class="flex-1 h-12 bg-app-surface border border-app-border text-app-text font-semibold rounded-xl hover:bg-app-card transition-colors">
                Zpět
            </button>
            <button id="nextStep2" class="flex-[2] h-12 bg-gradient-to-r from-app-primary to-app-accent text-white font-bold rounded-xl shadow-glow hover:shadow-glow-accent transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                Pokračovat
            </button>
        </div>
    </section>

    <section id="Step3" class="step-content flex-1 flex flex-col">
        <div class="flex-1">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-app-text mb-2">Kde se nacházíš?</h2>
                <p class="text-app-muted text-sm">Najdeme pro tebe nejbližší taneční akce ve tvém okolí</p>
            </div>

            <div class="space-y-4 mb-6">
                <div class="bg-app-surface border border-app-border rounded-2xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-2">Město</label>
                    <div class="relative">
                        <input type="text" placeholder="Např. Praha, Brno..." class="w-full h-12 pl-11 pr-4 bg-app-card border border-app-border rounded-xl text-app-text placeholder-app-muted focus:border-app-primary focus:ring-2 focus:ring-app-primary/20 focus:outline-none transition-all">
                        <i class="fa-solid fa-location-dot absolute left-4 top-1/2 transform -translate-y-1/2 text-app-primary text-sm"></i>
                    </div>
                </div>

                <div class="bg-app-surface border border-app-border rounded-2xl p-4">
                    <label class="block text-xs font-medium text-app-muted mb-3">Vyhledat akce v okruhu</label>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="radius" class="sr-only peer">
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                            <span class="text-sm text-app-text">10 km</span>
                        </label>

                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="radius" checked class="sr-only peer">
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                            <span class="text-sm text-app-text">25 km</span>
                        </label>

                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="radius" class="sr-only peer">
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                            <span class="text-sm text-app-text">50 km</span>
                        </label>

                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="radius" class="sr-only peer">
                            <div class="w-5 h-5 border-2 border-app-border rounded-full peer-checked:border-app-primary flex items-center justify-center">
                                <div class="w-2.5 h-2.5 bg-app-primary rounded-full hidden peer-checked:block"></div>
                            </div>
                            <span class="text-sm text-app-text">Celá republika</span>
                        </label>
                    </div>
                </div>

                <button class="w-full bg-app-surface border border-app-primary/30 rounded-2xl p-4 flex items-center justify-center gap-3 text-app-primary hover:bg-app-primary/10 transition-colors">
                    <i class="fa-solid fa-location-crosshairs text-lg"></i>
                    <span class="font-semibold">Použít aktuální polohu</span>
                </button>
            </div>
        </div>

        <div class="flex gap-3 mt-4">
            <button id="backStep3" class="flex-1 h-12 bg-app-surface border border-app-border text-app-text font-semibold rounded-xl hover:bg-app-card transition-colors">
                Zpět
            </button>
            <button id="finishOnboarding" class="flex-[2] h-12 bg-gradient-to-r from-app-primary to-app-accent text-white font-bold rounded-xl shadow-glow hover:shadow-glow-accent transition-all duration-300 transform hover:scale-[1.02] active:scale-[0.98]">
                Dokončit
            </button>
        </div>
    </section>

</main>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let currentStep = 1;
    const totalSteps = 3;
    
    const stepIndicators = document.querySelectorAll('.step-indicator');
    const stepContents = document.querySelectorAll('.step-content');
    
    const nextStep1 = document.getElementById('nextStep1');
    const nextStep2 = document.getElementById('nextStep2');
    const backStep2 = document.getElementById('backStep2');
    const backStep3 = document.getElementById('backStep3');
    const finishOnboarding = document.getElementById('finishOnboarding');
    const skipButton = document.getElementById('skipButton');
    
    function updateStep(step) {
        currentStep = step;
        
        stepContents.forEach((content, index) => {
            if (index + 1 === step) {
                content.classList.add('active');
            } else {
                content.classList.remove('active');
            }
        });
        
        stepIndicators.forEach((indicator, index) => {
            if (index < step) {
                indicator.classList.add('active');
            } else {
                indicator.classList.remove('active');
            }
        });
    }
    
    nextStep1.addEventListener('click', () => {
        updateStep(2);
    });
    
    nextStep2.addEventListener('click', () => {
        updateStep(3);
    });
    
    backStep2.addEventListener('click', () => {
        updateStep(1);
    });
    
    backStep3.addEventListener('click', () => {
        updateStep(2);
    });
    
    finishOnboarding.addEventListener('click', () => {
    });
    
    skipButton.addEventListener('click', () => {
    });
});
</script>

</body>
</html>
