<html lang="cs" class="dark">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Výběr tanečních stylů</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.FontAwesomeConfig = {
        autoReplaceSvg: 'nest'
      };
    </script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"
      crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme:
        {
          extend:
          {
            colors:
            {
              app:
              {
                bg: '#0F172A',
                surface: '#1E293B',
                card: '#111827',
                primary: '#3B82F6',
                accent: '#A855F7',
                success: '#22C55E',
                text: '#F8FAFC',
                muted: '#94A3B8',
                border: '#334155'
              }
            },
            fontFamily:
            {
              sans: ['Inter', 'sans-serif'],
            },
            boxShadow:
            {
              'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
            }
          }
        }
      }
    </script>
    <style>
      body
      {
        margin: 0;
        padding: 0;
        background-color: #0F172A;
        color: #F8FAFC;
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
      }

      ::-webkit-scrollbar
      {
        display: none;
      }

      .checkbox-item input[type="checkbox"]
      {
        appearance: none;
        width: 24px;
        height: 24px;
        border: 2px solid #334155;
        border-radius: 6px;
        background-color: #1E293B;
        cursor: pointer;
        position: relative;
        transition: all 0.2s;
      }

      .checkbox-item input[type="checkbox"]:checked
      {
        background-color: #3B82F6;
        border-color: #3B82F6;
      }

      .checkbox-item input[type="checkbox"]:checked::after
      {
        content: '\f00c';
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 12px;
      }
    </style>
  </head>

  <body
    class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl">
    <header id="FilterHeader"
      class="sticky top-0 z-50 bg-app-bg/95 backdrop-blur-md px-5 pt-12 pb-4 border-b border-app-border">
      <div class="flex items-center gap-4 mb-4"><button
          class="w-10 h-10 rounded-full bg-app-surface flex items-center justify-center"><i
            class="fa-solid fa-arrow-left text-lg"></i></button>
        <div class="flex-1">
          <h1 class="text-xl font-bold">Taneční styly</h1>
          <p id="SelectedCount" class="text-sm text-app-muted">0 vybraných</p>
        </div><button id="ClearAll"
          class="text-sm text-app-primary font-medium">Vymazat</button>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto pb-32 px-5 pt-6">
      <section id="DanceStylesFilter" class="space-y-3">
        <div
          class="bg-app-surface border border-app-border rounded-2xl overflow-hidden">
          <label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center">
                <i class="fa-solid fa-music text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Salsa</p>
                <p class="text-xs text-app-muted">Kubánská, On1, On2</p>
              </div>
            </div><input type="checkbox" data-style="Salsa"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                <i class="fa-solid fa-heart text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Bachata</p>
                <p class="text-xs text-app-muted">Sensual, Dominicana</p>
              </div>
            </div><input type="checkbox" data-style="Bachata"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center">
                <i class="fa-solid fa-fire text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Kizomba</p>
                <p class="text-xs text-app-muted">Urban Kiz, Semba</p>
              </div>
            </div><input type="checkbox" data-style="Kizomba"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-emerald-500 to-green-600 flex items-center justify-center">
                <i class="fa-solid fa-leaf text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Zouk</p>
                <p class="text-xs text-app-muted">Brazilian Zouk, Lambada</p>
              </div>
            </div><input type="checkbox" data-style="Zouk"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-orange-500 to-red-500 flex items-center justify-center">
                <i class="fa-solid fa-fire-flame-curved text-white text-lg"></i>
              </div>
              <div>
                <p class="font-semibold text-base">Reggaeton</p>
                <p class="text-xs text-app-muted">Urban Latin</p>
              </div>
            </div><input type="checkbox" data-style="Reggaeton"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-500 to-amber-600 flex items-center justify-center">
                <i class="fa-solid fa-bolt text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Tango</p>
                <p class="text-xs text-app-muted">Argentinské, Ballroom</p>
              </div>
            </div><input type="checkbox" data-style="Tango"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-cyan-500 to-blue-500 flex items-center justify-center">
                <i class="fa-solid fa-crown text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Swing</p>
                <p class="text-xs text-app-muted">Lindy Hop, Charleston</p>
              </div>
            </div><input type="checkbox" data-style="Swing"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-pink-500 to-rose-600 flex items-center justify-center">
                <i class="fa-solid fa-star text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Ballroom</p>
                <p class="text-xs text-app-muted">Standardní, Latinsko-americké
                </p>
              </div>
            </div><input type="checkbox" data-style="Ballroom"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer border-b border-app-border">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                <i class="fa-solid fa-drum text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Afro</p>
                <p class="text-xs text-app-muted">Afrohouse, Kuduro</p>
              </div>
            </div><input type="checkbox" data-style="Afro"
              class="dance-checkbox">
          </label><label
            class="checkbox-item flex items-center justify-between p-4 active:bg-app-card transition-colors cursor-pointer">
            <div class="flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-red-500 to-pink-600 flex items-center justify-center">
                <i class="fa-solid fa-umbrella text-white text-lg"></i></div>
              <div>
                <p class="font-semibold text-base">Forró</p>
                <p class="text-xs text-app-muted">Brazilský lidový tanec</p>
              </div>
            </div><input type="checkbox" data-style="Forró"
              class="dance-checkbox">
          </label></div>
      </section>
      <section id="SelectedStyles" class="mt-6 hidden">
        <h3
          class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">
          Vybrané styly</h3>
        <div id="SelectedTags" class="flex flex-wrap gap-2"></div>
      </section>
    </main>
    <div id="BottomActions"
      class="fixed bottom-0 w-full max-w-[430px] bg-gradient-to-t from-app-bg via-app-bg to-transparent px-5 pt-6 pb-8 z-50">
      <button id="ApplyFilter"
        class="w-full bg-app-primary text-white font-bold py-4 rounded-2xl shadow-glow hover:bg-blue-600 active:scale-95 transition-all">
        Použít filtr
      </button></div>
    <script>
      document.addEventListener('DOMContentLoaded', function()
      {
        const checkboxes = document.querySelectorAll('.dance-checkbox');
        const selectedCount = document.getElementById('SelectedCount');
        const clearAllBtn = document.getElementById('ClearAll');
        const selectedSection = document.getElementById('SelectedStyles');
        const selectedTags = document.getElementById('SelectedTags');
        const applyBtn = document.getElementById('ApplyFilter');

        function updateSelection()
        {
          const selected = Array.from(checkboxes).filter(cb => cb.checked);
          const count = selected.length;

          selectedCount.textContent = count === 0 ? '0 vybraných' :
            count === 1 ? '1 vybraný' : count < 5 ? `${count} vybrané` :
            `${count} vybraných`;

          if (count > 0)
          {
            selectedSection.classList.remove('hidden');
            selectedTags.innerHTML = selected.map(cb =>
            {
              const style = cb.dataset.style;
              return `<span class="px-3 py-1.5 bg-app-primary/20 border border-app-primary/40 text-app-primary rounded-full text-sm font-medium flex items-center gap-2">
                            ${style}
                            <i class="fa-solid fa-xmark text-xs cursor-pointer hover:text-white transition-colors" data-remove="${style}"></i>
                        </span>`;
            }).join('');

            selectedTags.querySelectorAll('[data-remove]').forEach(
              removeBtn =>
              {
                removeBtn.addEventListener('click', function()
                {
                  const styleToRemove = this.dataset.remove;
                  const checkbox = Array.from(checkboxes).find(cb =>
                    cb.dataset.style === styleToRemove);
                  if (checkbox)
                  {
                    checkbox.checked = false;
                    updateSelection();
                  }
                });
              });
          }
          else
          {
            selectedSection.classList.add('hidden');
          }

          applyBtn.textContent = count > 0 ? `Použít filtr (${count})` :
            'Použít filtr';
        }

        checkboxes.forEach(checkbox =>
        {
          checkbox.addEventListener('change', updateSelection);
        });

        clearAllBtn.addEventListener('click', function()
        {
          checkboxes.forEach(cb => cb.checked = false);
          updateSelection();
        });

        applyBtn.addEventListener('click', function()
        {
          const selected = Array.from(checkboxes).filter(cb => cb
            .checked).map(cb => cb.dataset.style);
        });

        updateSelection();
      });
    </script>
  </body>

</html>
