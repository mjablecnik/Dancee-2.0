<!DOCTYPE html>
<html lang="cs" class="dark">
<head>
    <script>
        window.FontAwesomeConfig = {
          autoReplaceSvg: 'nest'
        };
      </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0F172A',
                            surface: '#1E293B',
                            card: '#111827',
                            primary: '#3B82F6',
                            accent: '#A855F7',
                            success: '#22C55E',
                            text: '#F8FAFC',
                            muted: '#94A3B8',
                            border: '#334155'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'glow': '0 0 20px -5px rgba(59, 130, 246, 0.5)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0F172A;
            color: #F8FAFC;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-app-bg text-app-text min-h-[100dvh] flex flex-col w-full max-w-[430px] mx-auto relative shadow-2xl">

    <!-- Header -->
    <header id="ProfileHeader" class="sticky top-0 z-50 bg-app-bg/90 backdrop-blur-md px-5 pt-12 pb-4 border-b border-app-border">
        <div class="flex items-center justify-between">
            <button class="w-10 h-10 rounded-full bg-app-surface flex items-center justify-center text-app-text hover:bg-app-card transition-colors">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <h1 class="text-lg font-semibold">Profil</h1>
            <button class="w-10 h-10 rounded-full bg-app-surface flex items-center justify-center text-app-text hover:bg-app-card transition-colors">
                <i class="fa-solid fa-pen"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto pb-32">
        
        <!-- User Profile Section -->
        <section id="UserProfile" class="px-5 pt-6 pb-4">
            <div class="flex items-center gap-4 bg-app-surface border border-app-border rounded-xl p-4">
                <img class="w-16 h-16 rounded-full object-cover border-2 border-app-primary" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/avatars/avatar-5.jpg" alt="Profilová fotka" />
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-app-text">Tereza Nováková</h2>
                    <p class="text-sm text-app-muted">tereza.novakova@email.cz</p>
                    <div class="flex flex-wrap gap-1 mt-2">
                        <span class="text-xs px-2 py-1 rounded-full bg-app-primary/20 text-app-primary">Salsa</span>
                        <span class="text-xs px-2 py-1 rounded-full bg-app-accent/20 text-app-accent">Bachata</span>
                        <span class="text-xs px-2 py-1 rounded-full bg-emerald-500/20 text-emerald-400">Zouk</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Account Settings -->
        <section id="AccountSettings" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Účet</h3>
            <div class="bg-app-surface border border-app-border rounded-xl overflow-hidden">
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-app-card transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-app-primary/20 flex items-center justify-center">
                        <i class="fa-solid fa-user text-app-primary text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Upravit profil</p>
                        <p class="text-xs text-app-muted">Změnit informace o sobě</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
                
                <div class="border-t border-app-border"></div>
                
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-app-card transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-orange-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-lock text-orange-500 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Změnit heslo</p>
                        <p class="text-xs text-app-muted">Aktualizovat zabezpečení</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
            </div>
        </section>

        <!-- App Settings -->
        <section id="AppSettings" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Nastavení</h3>
            <div class="bg-app-surface border border-app-border rounded-xl overflow-hidden">
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-app-card transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-green-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-globe text-green-500 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Jazyk</p>
                        <p class="text-xs text-app-muted">Čeština</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
                
                <div class="border-t border-app-border"></div>
                
                <div class="w-full flex items-center gap-3 p-4">
                    <div class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-bell text-purple-500 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Oznámení</p>
                        <p class="text-xs text-app-muted">Přijímat upozornění</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" checked class="sr-only peer">
                        <div class="w-11 h-6 bg-app-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-app-primary"></div>
                    </label>
                </div>
            </div>
        </section>

        <!-- Premium/Monetization -->
        <section id="Premium" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Premium</h3>
            <div class="bg-gradient-to-br from-app-primary/20 via-app-accent/20 to-pink-500/20 border border-app-primary/30 rounded-xl overflow-hidden">
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-white/5 transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-app-primary to-app-accent flex items-center justify-center">
                        <i class="fa-solid fa-crown text-white text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-semibold text-app-text">Dancee Premium</p>
                        <p class="text-xs text-app-muted">Odemkněte všechny funkce</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-primary"></i>
                </button>
            </div>
        </section>

        <!-- Support -->
        <section id="Support" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Podpora</h3>
            <div class="bg-app-surface border border-app-border rounded-xl overflow-hidden">
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-app-card transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-message text-blue-500 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Napsat autorovi</p>
                        <p class="text-xs text-app-muted">Poslat zpětnou vazbu</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
                
                <div class="border-t border-app-border"></div>
                
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-app-card transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-yellow-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-star text-yellow-500 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Ohodnotit aplikaci</p>
                        <p class="text-xs text-app-muted">Pomůžete nám růst</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
            </div>
        </section>

        <!-- App Info -->
        <section id="AppInfo" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">O aplikaci</h3>
            <div class="bg-app-surface border border-app-border rounded-xl overflow-hidden">
                <div class="flex items-center gap-3 p-4">
                    <div class="w-8 h-8 rounded-lg bg-app-primary/20 flex items-center justify-center">
                        <i class="fa-solid fa-info text-app-primary text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Verze aplikace</p>
                        <p class="text-xs text-app-muted">1.2.5 (Build 125)</p>
                    </div>
                </div>
                
                <div class="border-t border-app-border"></div>
                
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-app-card transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-gray-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-shield-halved text-gray-400 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Podmínky použití</p>
                        <p class="text-xs text-app-muted">Právní informace</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
                
                <div class="border-t border-app-border"></div>
                
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-app-card transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-gray-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-user-shield text-gray-400 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-app-text">Ochrana soukromí</p>
                        <p class="text-xs text-app-muted">Jak chráníme vaše data</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
            </div>
        </section>

        <!-- Danger Zone -->
        <section id="DangerZone" class="px-5 pb-6">
            <h3 class="text-sm font-semibold text-app-muted mb-3 uppercase tracking-wide">Nebezpečná zóna</h3>
            <div class="bg-app-surface border border-app-border rounded-xl overflow-hidden">
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-red-500/10 transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-right-from-bracket text-red-500 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-red-500">Odhlásit se</p>
                        <p class="text-xs text-app-muted">Ukončit relaci</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
                
                <div class="border-t border-app-border"></div>
                
                <button class="w-full flex items-center gap-3 p-4 text-left hover:bg-red-500/10 transition-colors">
                    <div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center">
                        <i class="fa-solid fa-trash text-red-500 text-sm"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-medium text-red-500">Smazat účet</p>
                        <p class="text-xs text-app-muted">Trvale odstranit profil</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-app-muted"></i>
                </button>
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav id="BottomNavigation" class="fixed bottom-0 w-full max-w-[430px] bg-app-card/95 backdrop-blur-lg border-t border-app-border pb-safe pt-2 px-6 pb-6 z-50 rounded-t-3xl">
        <ul class="flex justify-between items-center">
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-house text-xl"></i>
                    <span class="text-[10px] font-medium">Domů</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-magnifying-glass text-xl"></i>
                    <span class="text-[10px] font-medium">Hledat</span>
                </a>
            </li>
            <li class="relative -top-5">
                <a href="#" class="flex items-center justify-center w-14 h-14 bg-app-primary text-white rounded-full shadow-glow border-4 border-app-bg transform hover:scale-105 transition-transform">
                    <i class="fa-solid fa-plus text-xl"></i>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-muted hover:text-app-primary transition-colors">
                    <i class="fa-solid fa-heart text-xl"></i>
                    <span class="text-[10px] font-medium">Uložené</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex flex-col items-center gap-1 p-2 text-app-primary">
                    <i class="fa-solid fa-user text-xl"></i>
                    <span class="text-[10px] font-medium">Profil</span>
                </a>
            </li>
        </ul>
    </nav>

</body>
</html>
