<!DOCTYPE html>
<html lang="cs">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { display: none; }
        body { font-family: 'Inter', sans-serif; }
        .input-error { border-color: #EF4444; background-color: #FEF2F2; }
        .error-message { display: none; color: #EF4444; font-size: 0.75rem; margin-top: 0.25rem; }
        .error-message.show { display: block; }
        .password-toggle { cursor: pointer; transition: color 0.2s; }
        .password-toggle:hover { color: #6366F1; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366F1',
                        primaryDark: '#4F46E5',
                        secondary: '#EC4899',
                        accent: '#8B5CF6',
                        dark: '#0F172A',
                        darker: '#020617',
                        light: '#F8FAFC'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-primary via-accent to-secondary min-h-screen">
    <div id="login-container" class="w-full max-w-[375px] mx-auto min-h-screen flex flex-col">
        <div id="login-header" class="pt-12 px-6 pb-6">
            <button id="back-button" class="w-10 h-10 bg-white/20 backdrop-blur-sm rounded-xl flex items-center justify-center mb-6 hover:bg-white/30 transition-all">
                <i class="fa-solid fa-arrow-left text-white text-lg"></i>
            </button>
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 bg-white rounded-2xl flex items-center justify-center shadow-xl">
                    <i class="fa-solid fa-music text-3xl text-primary"></i>
                </div>
            </div>
            <h1 class="text-white text-3xl font-bold text-center mb-1">Přihlášení</h1>
            <p class="text-white/90 text-sm text-center font-medium">Vítejte zpět v Dancee</p>
        </div>

        <div id="login-main" class="flex-1 bg-white rounded-t-[2rem] px-6 pt-8 pb-6 shadow-2xl">
            <div id="login-error-alert" class="hidden mb-4 p-4 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3">
                <i class="fa-solid fa-circle-exclamation text-red-500 text-lg mt-0.5"></i>
                <div class="flex-1">
                    <h4 class="text-sm font-semibold text-red-800 mb-1">Přihlášení se nezdařilo</h4>
                    <p class="text-xs text-red-600">Nesprávný e-mail nebo heslo. Zkuste to prosím znovu.</p>
                </div>
            </div>

            <form id="loginForm" class="mb-6">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-semibold text-dark mb-2">E-mail</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2">
                            <i class="fa-solid fa-envelope text-gray-400"></i>
                        </div>
                        <input type="email" id="email" placeholder="vas@email.cz" class="w-full h-14 pl-12 pr-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-primary transition-all duration-300 text-dark font-medium">
                    </div>
                    <div id="email-error" class="error-message">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <span>Zadejte platnou e-mailovou adresu</span>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="block text-sm font-semibold text-dark mb-2">Heslo</label>
                    <div class="relative">
                        <div class="absolute left-4 top-1/2 -translate-y-1/2">
                            <i class="fa-solid fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" placeholder="••••••••" class="w-full h-14 pl-12 pr-12 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-primary transition-all duration-300 text-dark font-medium">
                        <div id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 password-toggle">
                            <i id="eyeIcon" class="fa-solid fa-eye text-gray-400"></i>
                        </div>
                    </div>
                    <div id="password-error" class="error-message">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <span>Heslo musí mít alespoň 6 znaků</span>
                    </div>
                </div>

                <div class="flex justify-end mb-6">
                    <a href="#" class="text-sm font-semibold text-primary hover:text-primaryDark transition-colors">Zapomněli jste heslo?</a>
                </div>

                <button type="submit" class="w-full h-14 bg-gradient-to-r from-primary to-accent text-white rounded-xl font-bold text-base shadow-lg hover:shadow-xl transition-all duration-300 flex items-center justify-center gap-2 mb-6">
                    <span>Přihlásit se</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </form>

            <div class="flex items-center gap-3 mb-6">
                <div class="flex-1 h-px bg-gray-200"></div>
                <span class="text-xs text-gray-500 font-medium">NEBO</span>
                <div class="flex-1 h-px bg-gray-200"></div>
            </div>

            <div id="social-login-section" class="space-y-3 mb-6">
                <button class="w-full h-14 bg-white border-2 border-gray-200 rounded-xl font-semibold text-dark hover:border-gray-300 hover:bg-gray-50 transition-all duration-300 flex items-center justify-center gap-3">
                    <i class="fa-brands fa-google text-xl text-red-500"></i>
                    <span>Pokračovat s Google</span>
                </button>
                <button class="w-full h-14 bg-white border-2 border-gray-200 rounded-xl font-semibold text-dark hover:border-gray-300 hover:bg-gray-50 transition-all duration-300 flex items-center justify-center gap-3">
                    <i class="fa-brands fa-apple text-xl"></i>
                    <span>Pokračovat s Apple</span>
                </button>
            </div>

            <div class="text-center pt-4">
                <p class="text-sm text-gray-600">
                    Nemáte účet? 
                    <a href="#" class="font-semibold text-primary hover:text-primaryDark transition-colors">Zaregistrujte se</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');
            const loginErrorAlert = document.getElementById('login-error-alert');
            const togglePassword = document.getElementById('togglePassword');
            const eyeIcon = document.getElementById('eyeIcon');

            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                }
            });

            function validateEmail(email) {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            }

            function validatePassword(password) {
                return password.length >= 6;
            }

            emailInput.addEventListener('blur', function() {
                if (emailInput.value && !validateEmail(emailInput.value)) {
                    emailInput.classList.add('input-error');
                    emailError.classList.add('show');
                } else {
                    emailInput.classList.remove('input-error');
                    emailError.classList.remove('show');
                }
            });

            emailInput.addEventListener('input', function() {
                if (emailInput.classList.contains('input-error')) {
                    emailInput.classList.remove('input-error');
                    emailError.classList.remove('show');
                }
                if (loginErrorAlert.classList.contains('hidden') === false) {
                    loginErrorAlert.classList.add('hidden');
                }
            });

            passwordInput.addEventListener('blur', function() {
                if (passwordInput.value && !validatePassword(passwordInput.value)) {
                    passwordInput.classList.add('input-error');
                    passwordError.classList.add('show');
                } else {
                    passwordInput.classList.remove('input-error');
                    passwordError.classList.remove('show');
                }
            });

            passwordInput.addEventListener('input', function() {
                if (passwordInput.classList.contains('input-error')) {
                    passwordInput.classList.remove('input-error');
                    passwordError.classList.remove('show');
                }
                if (loginErrorAlert.classList.contains('hidden') === false) {
                    loginErrorAlert.classList.add('hidden');
                }
            });

            loginForm.addEventListener('submit', function(e) {
                e.preventDefault();
                
                let isValid = true;
                
                if (!emailInput.value) {
                    emailInput.classList.add('input-error');
                    emailError.querySelector('span').textContent = 'E-mail je povinný';
                    emailError.classList.add('show');
                    isValid = false;
                } else if (!validateEmail(emailInput.value)) {
                    emailInput.classList.add('input-error');
                    emailError.querySelector('span').textContent = 'Zadejte platnou e-mailovou adresu';
                    emailError.classList.add('show');
                    isValid = false;
                }
                
                if (!passwordInput.value) {
                    passwordInput.classList.add('input-error');
                    passwordError.querySelector('span').textContent = 'Heslo je povinné';
                    passwordError.classList.add('show');
                    isValid = false;
                } else if (!validatePassword(passwordInput.value)) {
                    passwordInput.classList.add('input-error');
                    passwordError.querySelector('span').textContent = 'Heslo musí mít alespoň 6 znaků';
                    passwordError.classList.add('show');
                    isValid = false;
                }
                
                if (isValid) {
                    loginErrorAlert.classList.remove('hidden');
                    setTimeout(() => {
                        loginErrorAlert.classList.add('hidden');
                    }, 5000);
                }
            });
        });
    </script>
</body>
</html>
