version: '3'

tasks:
  run-web:
    desc: Run Flutter app on web
    cmd: flutter run -d web-server --web-port 3000

  run-android:
    desc: Run Flutter app on Android
    cmd: flutter run -d android

  run-ios:
    desc: Run Flutter app on iOS
    cmd: flutter run -d ios

  build-web:
    desc: Build Flutter app for web
    cmd: flutter build web

  build-android:
    desc: Build Flutter app for Android (APK)
    cmd: flutter build apk

  build-ios:
    desc: Build Flutter app for iOS
    cmd: flutter build ios

  clean:
    desc: Clean Flutter project
    cmd: flutter clean

  get-deps:
    desc: Get Flutter dependencies
    cmd: flutter pub get

  build-runner:
    desc: Run build runner for code generation
    cmd: flutter packages pub run build_runner build

  build-runner-force:
    desc: Run build runner with delete conflicting outputs
    cmd: dart run build_runner build --delete-conflicting-outputs

  build-runner-watch:
    desc: Run build runner in watch mode
    cmd: flutter packages pub run build_runner watch

  build-runner-clean:
    desc: Clean build runner generated files
    cmd: flutter packages pub run build_runner clean
